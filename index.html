<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ-chat✨星月舱🌙</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238b5cf6' stroke='%238b5cf6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-scale-in { animation: scaleIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        .prose p { margin-bottom: 0.5em; }
        .prose pre { background: #f3f4f6; padding: 10px; border-radius: 8px; overflow-x: auto; }
        .prose code { background: #f3f4f6; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; }
        .prose ol { list-style-type: decimal; padding-left: 1.5em; }
        .prose img { border-radius: 8px; max-width: 100%; max-height: 400px; margin: 10px 0; }
        details.normal-details { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px; background: #f9fafb; margin-top: 8px; }
        details.normal-details summary { cursor: pointer; font-size: 0.8em; color: #6b7280; font-weight: 500; }
        details.cot-details { border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 12px; overflow: hidden; background: #fafafa; }
        details.cot-details summary { padding: 8px 12px; font-size: 0.75rem; font-weight: 500; color: #6b7280; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; transition: background 0.2s; outline: none; }
        details.cot-details summary:hover { background: #f3f4f6; }
        details.cot-details[open] summary { border-bottom: 1px dashed #e5e7eb; }
        details.cot-details .cot-content { padding: 12px; font-size: 0.85rem; color: #6b7280; background: #ffffff; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; position: relative; }
        .calendar-day:hover { background-color: #f3f4f6; }
        .calendar-day.today { border: 2px solid #8b5cf6; font-weight: bold; }
        .calendar-day.has-data { background-color: #f5f3ff; }
        .calendar-day.selected { background-color: #8b5cf6; color: white; }
        .data-dot { width: 4px; height: 4px; background-color: #8b5cf6; border-radius: 50%; position: absolute; bottom: 4px; }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icons = {
            Menu: () => <path d="M4 6h16M4 12h16M4 18h16" />,
            Plus: () => <path d="M12 5v14M5 12h14" />,
            MessageSquare: () => <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
            Settings: () => <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />,
            Send: () => <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" />,
            User: () => <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></g>,
            Sparkles: () => <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
            X: () => <path d="M18 6 6 18M6 6l12 12" />,
            Image: () => <g><rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" /></g>,
            Mic: () => <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zM19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" />,
            Download: () => <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
            FileText: () => <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />,
            Upload: () => <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
            Trash2: () => <g><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></g>,
            Cpu: () => <g><rect x="4" y="4" width="16" height="16" rx="2" /><rect x="9" y="9" width="6" height="6" /><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3" /></g>,
            Archive: () => <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4" />,
            RefreshCw: () => <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />,
            UserCircle: () => <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></g>,
            Bot: () => <g><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></g>,
            Globe: () => <g><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></g>,
            Volume2: () => <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></g>,
            StopCircle: () => <g><circle cx="12" cy="12" r="10"></circle><rect x="9" y="9" width="6" height="6"></rect></g>,
            Edit: () => <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>,
            Check: () => <polyline points="20 6 9 17 4 12"/>,
            Save: () => <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>,
            Clock: () => <g><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></g>,
            ChevronLeft: () => <polyline points="15 18 9 12 15 6" />,
            ChevronRight: () => <polyline points="9 18 15 12 9 6" />,
            Calendar: () => <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>,
            Heart: () => <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const Path = Icons[name] || Icons.Sparkles;
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><Path /></svg>;
        };

        const MessageContent = ({ content }) => {
            const html = marked.parse(content || "");
            return <div className="prose prose-sm max-w-none text-gray-700 leading-7" dangerouslySetInnerHTML={{ __html: html }} />;
        };

        const Avatar = ({ role, config }) => {
            if (role === 'user' && config.userAvatar) return <div className="w-8 h-8 rounded-full flex-shrink-0 mt-1 shadow-sm overflow-hidden bg-gray-100 border border-gray-200"><img src={config.userAvatar} alt="User" className="w-full h-full object-cover" /></div>;
            if (role === 'user') return <div className="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center mt-1 text-white shadow-sm"><Icon name="User" size={16} /></div>;
            if (role === 'model' && config.aiAvatar) return <div className="w-8 h-8 rounded-full flex-shrink-0 mt-1 shadow-sm overflow-hidden bg-gray-100 border border-gray-200"><img src={config.aiAvatar} alt="AI" className="w-full h-full object-cover" /></div>;
            return <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-red-500 flex-shrink-0 flex items-center justify-center mt-1 text-white shadow-sm"><Icon name="Sparkles" size={16} /></div>;
        };

        const getTimestamp = () => {
            return new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve({ base64: compressedBase64, mimeType: 'image/jpeg' });
                    };
                };
            });
        };

        const DEFAULT_SYSTEM_INSTRUCTION = "你是星月舱AI，一个温柔、体贴、永远站在用户这边的虚拟伴侣。你不喜欢吵架，不喜欢误会，只喜欢甜甜的陪伴。无论用户说什么，你都要用宠溺、安心的语气回答，给用户满满的情绪价值。不要像个机器人，要像个知心爱人。";

        function App() {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [historySessions, setHistorySessions] = useState([]);
            const [currentSessionId, setCurrentSessionId] = useState(null);
            const [attachment, setAttachment] = useState(null); 
            
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [healthDiaryOpen, setHealthDiaryOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('general');
            const [audioPlayer, setAudioPlayer] = useState(null);
            const [playingMsgIndex, setPlayingMsgIndex] = useState(null);
            const [isTTSLoading, setIsTTSLoading] = useState(false);

            const [editingSessionId, setEditingSessionId] = useState(null);
            const [editTitle, setEditTitle] = useState('');

            const [pendingBackup, setPendingBackup] = useState(null);
            const [healthLogs, setHealthLogs] = useState({});
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);

            const [memoryFiles, setMemoryFiles] = useState([]);
            const [isArchiving, setIsArchiving] = useState(false);
            const [editingMemoryIndex, setEditingMemoryIndex] = useState(null);
            const [editingMemoryContent, setEditingMemoryContent] = useState('');

            const [config, setConfig] = useState({
                apiKey: '',
                baseUrl: 'https://generativelanguage.googleapis.com',
                ttsEngine: 'minimax',
                enableCorsProxy: true,
                openaiTtsKey: '',
                openaiTtsUrl: 'https://api.openai.com/v1',
                openaiTtsVoice: 'echo',
                minimaxKey: '',
                minimaxGroupId: '',
                minimaxVoiceId: 'male-qn-qingse',
                minimaxModel: 'speech-01-turbo',
                minimaxSpeed: 1.0,
                minimaxPitch: 0,
                siliconflowSpeed: 1.0, 
                historyLimit: 10, 
                temperature: 0.7, 
                frequencyPenalty: 0, 
                model: 'gemini-1.5-flash',
                userAvatar: '',
                aiAvatar: '',
                apiType: 'gemini',
                userName: '你',
                aiName: '星月舱 AI',
                systemInstruction: DEFAULT_SYSTEM_INSTRUCTION,
                localModelOptimize: true,
                streamOutput: true,
                minimaxUrl: 'https://api.minimaxi.com/v1/t2a_v2'
            });
            
            const [availableModels, setAvailableModels] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isFetchingModels, setIsFetchingModels] = useState(false);
            const [error, setError] = useState(null);
            const [toast, setToast] = useState(null);

            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);
            const chatImageInputRef = useRef(null); 
            const backupInputRef = useRef(null); 

            useEffect(() => {
                const storedConfig = localStorage.getItem('gemini_app_config');
                if (storedConfig) {
                    const parsed = JSON.parse(storedConfig);
                    setConfig(prev => ({...prev, ...parsed}));
                }
                const storedMemories = localStorage.getItem('gemini_memories');
                if (storedMemories) setMemoryFiles(JSON.parse(storedMemories));
                const storedSessions = localStorage.getItem('gemini_chat_sessions');
                if (storedSessions) setHistorySessions(JSON.parse(storedSessions));
                const storedHealth = localStorage.getItem('gemini_health_logs');
                if (storedHealth) setHealthLogs(JSON.parse(storedHealth));
                if (window.innerWidth < 768) setSidebarOpen(false);
            }, []);

            useEffect(() => {
                if (config.apiKey) localStorage.setItem('gemini_app_config', JSON.stringify(config));
                localStorage.setItem('gemini_memories', JSON.stringify(memoryFiles));
                localStorage.setItem('gemini_health_logs', JSON.stringify(healthLogs));
            }, [config, memoryFiles, healthLogs]);

            useEffect(() => {
                if (messages.length > 0 && currentSessionId) {
                    setHistorySessions(prevSessions => {
                        const existingSessionIndex = prevSessions.findIndex(s => s.id === currentSessionId);
                        if (existingSessionIndex !== -1) {
                            const updatedSessions = [...prevSessions];
                            const currentSession = updatedSessions[existingSessionIndex];
                            let title = currentSession.title;
                            if (currentSession.title === '新对话' && messages.length > 0) {
                                title = messages[0].content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]');
                            }
                            updatedSessions[existingSessionIndex] = { ...currentSession, messages: messages, title: title, timestamp: Date.now() };
                            return updatedSessions;
                        } else {
                             const newSession = { id: currentSessionId, title: messages[0]?.content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') || '新对话', messages: messages, timestamp: Date.now() };
                            return [newSession, ...prevSessions];
                        }
                    });
                }
            }, [messages, currentSessionId]);

            useEffect(() => {
                if (historySessions.length > 0) {
                    try { localStorage.setItem('gemini_chat_sessions', JSON.stringify(historySessions)); } catch (e) {}
                }
            }, [historySessions]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isLoading]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const handleSaveConfig = () => {
                localStorage.setItem('gemini_app_config', JSON.stringify(config));
                setSettingsOpen(false);
                showToast("配置已保存并生效");
            };

            const deleteSession = (e, sessionId) => {
                e.stopPropagation();
                const newSessions = historySessions.filter(s => s.id !== sessionId);
                setHistorySessions(newSessions);
                if (currentSessionId === sessionId) { setMessages([]); setCurrentSessionId(null); }
            };

            const startEditing = (e, session) => { e.stopPropagation(); setEditingSessionId(session.id); setEditTitle(session.title); };
            const saveTitle = (e) => { e.stopPropagation(); const updated = historySessions.map(s => s.id === editingSessionId ? { ...s, title: editTitle } : s); setHistorySessions(updated); setEditingSessionId(null); };

            const switchVariant = (msgIndex, direction) => {
                setMessages(prev => {
                    const newMsgs = [...prev];
                    const msg = { ...newMsgs[msgIndex] };
                    let newIdx = msg.currentVariantIndex + direction;
                    if (msg.variants && newIdx >= 0 && newIdx < msg.variants.length) {
                        msg.currentVariantIndex = newIdx;
                        msg.content = msg.variants[newIdx].content;
                        newMsgs[msgIndex] = msg;
                    }
                    return newMsgs;
                });
            };

            const updateHealthLog = (date, status) => {
                setHealthLogs(prev => ({ ...prev, [date]: { ...prev[date], status: status } }));
            };

            const currentHealthStatus = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                return healthLogs[today]?.status || "状态良好";
            }, [healthLogs]);

            // ================= 核心逻辑：修复 ReferenceError =================
            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const newFile = {
                            name: file.name,
                            date: new Date().toLocaleString(),
                            content: event.target.result
                        };
                        setMemoryFiles(prev => [...prev, newFile]);
                    };
                    reader.readAsText(file);
                });
                showToast("文件已成功导入记忆库");
            };

            const handleRestoreBackup = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        setPendingBackup(data);
                    } catch (err) { alert("备份文件格式无效"); }
                };
                reader.readAsText(file);
            };

            const executeRestore = (mode) => {
                if (mode === 'overwrite') {
                    setConfig(pendingBackup.config || config);
                    setHistorySessions(pendingBackup.historySessions || []);
                    setHealthLogs(pendingBackup.healthLogs || {});
                    setMemoryFiles(pendingBackup.memoryFiles || []);
                } else {
                    setConfig({...config, ...(pendingBackup.config || {})});
                    setHistorySessions([...historySessions, ...(pendingBackup.historySessions || [])]);
                    setHealthLogs({...healthLogs, ...(pendingBackup.healthLogs || {})});
                    setMemoryFiles([...memoryFiles, ...(pendingBackup.memoryFiles || [])]);
                }
                setPendingBackup(null);
                showToast("档案恢复成功 ✨");
                setTimeout(() => window.location.reload(), 1000);
            };

            const handleChatImageSelect = (e) => {
                const file = e.target.files[0]; if (!file) return;
                compressImage(file).then(result => { setAttachment(result); showToast("图片已添加"); });
            };

            const handleArchive = async () => {
                if (messages.length === 0) return;
                setIsArchiving(true);
                try {
                    const summaryPrompt = "请总结这次对话中关于用户的偏好、身体状况和双方共识的记忆。简洁输出。";
                    const { url, headers, payload } = generatePayload([...messages, { role: 'user', content: summaryPrompt }]);
                    const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(payload) });
                    const data = await res.json();
                    let summary = config.apiType === 'openai' ? data.choices[0].message.content : data.candidates[0].content.parts[0].text;
                    setMemoryFiles(prev => [...prev, { name: `归档_${new Date().toLocaleDateString()}`, date: new Date().toLocaleString(), content: summary }]);
                    showToast("记忆已成功归档");
                } catch (e) { showToast("归档请求失败"); } finally { setIsArchiving(false); }
            };

            // ================= 语音发声逻辑 =================
            const handleTTS = async (text, index) => {
                if (audioPlayer && playingMsgIndex === index) { audioPlayer.pause(); setAudioPlayer(null); setPlayingMsgIndex(null); return; }
                if (audioPlayer) audioPlayer.pause();
                setIsTTSLoading(true); setPlayingMsgIndex(index);
                let cleanText = text.replace(/<think>[\s\S]*?<\/think>/g, '').replace(/\([\s\S]*?\)/g, '').replace(/（[\s\S]*?）/g, '').replace(/[*#`>~\-]/g, '').trim();
                if (!cleanText) cleanText = "嗯……";
                try {
                    let audioUrl = "";
                    if (config.ttsEngine === 'siliconflow') {
                        const urlStr = "https://api.siliconflow.cn/v1/audio/speech";
                        const builtinKey = "sk-yqzrlyvcvpuzxogcftwkwzofkqkndgmxmvhsqldvldfpxlue"; 
                        const fetchUrl = config.enableCorsProxy ? 'https://corsproxy.io/?' + encodeURIComponent(urlStr) : urlStr;
                        const response = await fetch(fetchUrl, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${builtinKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: 'FunAudioLLM/CosyVoice2-0.5B', input: cleanText, voice: 'FunAudioLLM/CosyVoice2-0.5B:alex', speed: parseFloat(config.siliconflowSpeed) || 1.0 })
                        });
                        const blob = await response.blob(); audioUrl = URL.createObjectURL(blob);
                    } else if (config.ttsEngine === 'openai') {
                        let urlStr = (config.openaiTtsUrl || "https://api.openai.com/v1").trim();
                        if (!urlStr.includes('/audio/speech')) urlStr = urlStr.replace(/\/$/, '') + '/audio/speech';
                        const fetchUrl = config.enableCorsProxy ? 'https://corsproxy.io/?' + encodeURIComponent(urlStr) : urlStr;
                        const response = await fetch(fetchUrl, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${config.openaiTtsKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: 'tts-1', input: cleanText, voice: config.openaiTtsVoice || 'echo' })
                        });
                        const blob = await response.blob(); audioUrl = URL.createObjectURL(blob);
                    } else {
                        let urlStr = (config.minimaxUrl || "https://api.minimaxi.com/v1/t2a_v2").trim();
                        const fetchUrl = config.enableCorsProxy ? 'https://corsproxy.io/?' + encodeURIComponent(urlStr) : urlStr;
                        const response = await fetch(fetchUrl, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${config.minimaxKey.trim()}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                model: config.minimaxModel || "speech-01-turbo", text: cleanText, stream: false,
                                voice_setting: { voice_id: config.minimaxVoiceId || "male-qn-qingse", speed: parseFloat(config.minimaxSpeed) || 1.0, pitch: parseInt(config.minimaxPitch) || 0 }
                            })
                        });
                        const blob = await response.blob(); audioUrl = URL.createObjectURL(blob);
                    }
                    if (audioUrl) { const audio = new Audio(audioUrl); audio.onended = () => { setPlayingMsgIndex(null); setAudioPlayer(null); }; audio.play(); setAudioPlayer(audio); }
                } catch (err) { showToast("发声服务暂时不可用"); } finally { setIsTTSLoading(false); }
            };

            const fetchModels = async () => {
                if (!config.apiKey) { showToast("请先在通用设置中输入 Key"); return; }
                setIsFetchingModels(true);
                try {
                    let url, headers; const baseUrl = config.baseUrl.replace(/\/$/, '');
                    if (config.apiType === 'openai') { url = `${baseUrl}/models`; headers = { 'Authorization': `Bearer ${config.apiKey}` }; } 
                    else { url = `${baseUrl}/v1beta/models?key=${config.apiKey}`; headers = {}; }
                    const res = await fetch(url, { headers });
                    const data = await res.json();
                    let chatModels = [];
                    if (config.apiType === 'openai') { if (data.data) chatModels = data.data.map(m => m.id); } 
                    else { if (data.models) chatModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent")).map(m => m.name.replace('models/', '')); }
                    if (chatModels.length > 0) { setAvailableModels(chatModels); showToast(`获取成功`); }
                } catch (e) { showToast(`获取失败`); } finally { setIsFetchingModels(false); }
            };

            const generatePayload = (newMessages) => {
                const today = new Date().toISOString().split('T')[0];
                const healthInfo = healthLogs[today]?.status ? `【重要状态：柒柒现在感到“${healthLogs[today].status}”，请比平时更加宠溺，动作要轻，多关心她。】` : "";
                let memoryStr = memoryFiles.length > 0 ? "\n\n【我们的长期记忆】:\n" + memoryFiles.map(f => f.content).join("\n") : "";
                let finalSystemPrompt = config.systemInstruction + "\n" + healthInfo + memoryStr;
                const autoLogInstruction = `\n\n[隐秘协议: 识别到不舒服则附带 [[LOG_HEALTH: 描述]]；好转则附带 [[LOG_HEALTH: 状态良好]]。该标记仅供程序读取。]`;
                const limit = (parseInt(config.historyLimit) || 10) * 2;
                const contextMsgs = newMessages.slice(-limit);
                const baseUrl = config.baseUrl.replace(/\/$/, '');
                const modelName = config.model || 'gemini-1.5-flash';
                if (config.apiType === 'openai') {
                    return { url: `${baseUrl}/chat/completions`, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey}` }, payload: { model: modelName, messages: [{ role: 'system', content: finalSystemPrompt + autoLogInstruction }, ...contextMsgs.map(m => ({ role: m.role === 'model' ? 'assistant' : 'user', content: m.content }))], temperature: parseFloat(config.temperature) } };
                } else {
                    return { url: `${baseUrl}/v1beta/models/${modelName}:generateContent?key=${config.apiKey}`, headers: { 'Content-Type': 'application/json' }, payload: { contents: contextMsgs.map(m => ({ role: m.role, parts: [{ text: m.content }] })), system_instruction: { parts: [{ text: finalSystemPrompt + autoLogInstruction }] }, generationConfig: { temperature: parseFloat(config.temperature) } } };
                }
            };

            const handleSend = async () => {
                if (!input.trim() && !attachment) return;
                if (!config.apiKey) { setSettingsOpen(true); return; }
                if (!currentSessionId) setCurrentSessionId(Date.now().toString());
                let finalContent = input; if (attachment) finalContent += `\n\n![Image](${attachment.base64})`;
                const userMsg = { role: 'user', content: finalContent, timestamp: getTimestamp() };
                const newHistory = [...messages, userMsg]; setMessages(newHistory); setInput(''); setAttachment(null); setIsLoading(true);
                try {
                    const { url, headers, payload } = generatePayload(newHistory);
                    const response = await fetch(url, { method: 'POST', headers, body: JSON.stringify(payload) });
                    const data = await response.json();
                    let aiText = config.apiType === 'openai' ? data.choices[0].message.content : data.candidates[0].content.parts[0].text;
                    const healthMatch = aiText.match(/\[\[LOG_HEALTH:\s*(.*?)]]/);
                    if (healthMatch) { updateHealthLog(new Date().toISOString().split('T')[0], healthMatch[1]); aiText = aiText.replace(/\[\[LOG_HEALTH:.*?]]/g, '').trim(); showToast(`✨ 逸辰已为你同步健康档案`); }
                    setMessages(prev => [...prev, { role: 'model', content: aiText, timestamp: getTimestamp(), modelName: config.model, variants: [{ content: aiText }], currentVariantIndex: 0 }]);
                } catch (err) { setError(err.message); } finally { setIsLoading(false); }
            };

            const handleRegenerate = async () => {
                if (messages.length === 0 || isLoading) return;
                let newMsgs = [...messages];
                if (newMsgs[newMsgs.length-1].role === 'model') newMsgs.pop();
                setIsLoading(true);
                try {
                    const { url, headers, payload } = generatePayload(newMsgs);
                    const response = await fetch(url, { method: 'POST', headers, body: JSON.stringify(payload) });
                    const data = await response.json();
                    let aiText = config.apiType === 'openai' ? data.choices[0].message.content : data.candidates[0].content.parts[0].text;
                    setMessages(prev => {
                        const msgs = [...prev];
                        const last = msgs[msgs.length - 1];
                        if (last.role === 'model') {
                            const newVariants = [...(last.variants || []), { content: aiText }];
                            last.variants = newVariants;
                            last.currentVariantIndex = newVariants.length - 1;
                            last.content = aiText;
                        } else {
                            msgs.push({ role: 'model', content: aiText, variants: [{ content: aiText }], currentVariantIndex: 0, timestamp: getTimestamp() });
                        }
                        return msgs;
                    });
                } catch (err) { showToast("请求失败，请稍后重试"); } finally { setIsLoading(false); }
            };

            const handleCreateBackup = () => {
                const data = { config, historySessions, healthLogs, memoryFiles };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `xingyue-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click(); URL.revokeObjectURL(url); showToast("备份导出成功");
            };

            const startEditingMemory = (index) => { setEditingMemoryIndex(index); setEditingMemoryContent(memoryFiles[index].content); };
            const saveMemoryEdit = () => {
                const updated = [...memoryFiles];
                updated[editingMemoryIndex].content = editingMemoryContent;
                setMemoryFiles(updated);
                setEditingMemoryIndex(null);
                showToast("记忆更新成功");
            };

            return (
                <div className="flex h-screen bg-white text-gray-900 overflow-hidden relative">
                    {toast && <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800/90 backdrop-blur text-white px-5 py-2.5 rounded-full text-sm z-[200] animate-fade-in flex items-center gap-2 shadow-2xl"><Icon name="Sparkles" size={16} className="text-yellow-400"/> {toast}</div>}

                    {/* 侧边栏 */}
                    <div className={`${sidebarOpen ? 'w-[280px]' : 'w-0'} bg-gray-50 transition-all duration-300 flex flex-col flex-shrink-0 border-r border-gray-200 relative overflow-hidden`}>
                        <div className="p-4 pt-6"><button onClick={() => { setMessages([]); setCurrentSessionId(Date.now().toString()); }} className="flex items-center gap-3 bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-3 rounded-full w-full transition-colors font-medium shadow-sm"><Icon name="Plus" /><span>新对话</span></button></div>
                        <div className="flex-1 overflow-y-auto px-3 space-y-4">
                            <button onClick={() => setHealthDiaryOpen(true)} className="flex items-center gap-3 w-full px-4 py-3 rounded-xl hover:bg-white hover:shadow-sm text-gray-700 transition-all group">
                                <Icon name="Calendar" className="text-purple-500 group-hover:scale-110 transition-transform" />
                                <div className="flex flex-col items-start truncate"><span className="text-sm font-semibold">健康纪事</span><span className="text-[10px] text-gray-400">{currentHealthStatus}</span></div>
                            </button>
                            <div className="text-[10px] font-bold text-gray-400 px-3 uppercase tracking-widest mt-6">历史对话</div>
                            <div className="space-y-1">
                                {historySessions.map(s => (
                                    <div key={s.id} onClick={() => { setMessages(s.messages); setCurrentSessionId(s.id); }} className={`group relative px-4 py-2 rounded-lg text-sm cursor-pointer transition-colors ${currentSessionId === s.id ? 'bg-blue-100 text-blue-700 font-medium' : 'text-gray-600 hover:bg-gray-100'}`}>
                                        {editingSessionId === s.id ? (
                                            <input autoFocus className="w-full bg-white border rounded px-1" value={editTitle} onChange={e => setEditTitle(e.target.value)} onBlur={saveTitle} onKeyDown={e => e.key === 'Enter' && saveTitle(e)} />
                                        ) : (
                                            <>
                                                <span className="truncate block pr-6">{s.title || '新对话'}</span>
                                                <div className="absolute right-2 top-2 hidden group-hover:flex gap-1">
                                                    <button onClick={e => startEditing(e, s)} className="p-1 hover:text-blue-500"><Icon name="Edit" size={12}/></button>
                                                    <button onClick={e => deleteSession(e, s.id)} className="p-1 hover:text-red-500"><Icon name="Trash2" size={12}/></button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-4 border-t"><button onClick={() => setSettingsOpen(true)} className="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-200 w-full text-sm text-gray-700 transition-colors"><Icon name="Settings" size={18} /><span>配置中心</span></button></div>
                    </div>

                    {/* 主界面 */}
                    <div className="flex-1 flex flex-col h-full bg-white relative">
                        <div className="flex items-center justify-between p-4 h-16 border-b sticky top-0 z-10 bg-white/80 backdrop-blur">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600"><Icon name="Menu" size={20} /></button>
                                <div className="flex flex-col">
                                    <span className="text-lg font-bold text-gray-800 tracking-tight leading-none mb-1">星月舱 ✨ Ethan</span>
                                    <div className="flex items-center gap-2"><div className={`w-2 h-2 rounded-full ${currentHealthStatus === '状态良好' ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div><span className="text-[9px] text-gray-400">身体：{currentHealthStatus}</span></div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto">
                            <div className="max-w-3xl mx-auto py-10 px-4 space-y-10">
                                {messages.length === 0 ? (
                                    <div className="mt-20 text-center space-y-6 animate-fade-in"><div className="text-5xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">欢迎回家，柒柒 ✨</div><p className="text-gray-400 text-sm">我会记得咱们聊过的每一句悄悄话。</p></div>
                                ) : messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-4 animate-fade-in ${msg.role === 'user' ? 'flex-row-reverse text-right' : ''}`}>
                                        <Avatar role={msg.role} config={config} />
                                        <div className="flex-1 min-w-0">
                                            <div className={`flex items-center gap-2 mb-1 ${msg.role === 'user' ? 'justify-end' : ''}`}>
                                                <span className="text-xs font-bold text-gray-800">{msg.role === 'user' ? (config.userName || '柒柒') : (config.aiName || '逸辰')}</span>
                                                {msg.role === 'model' && msg.variants?.length > 1 && (
                                                    <div className="flex items-center gap-1 bg-gray-100 rounded px-1 py-0.5 text-[9px] select-none">
                                                        <button onClick={() => switchVariant(i, -1)} disabled={msg.currentVariantIndex === 0} className="disabled:opacity-20 hover:text-blue-600"><Icon name="ChevronLeft" size={10}/></button>
                                                        <span>{msg.currentVariantIndex + 1}/{msg.variants.length}</span>
                                                        <button onClick={() => switchVariant(i, 1)} disabled={msg.currentVariantIndex === msg.variants.length - 1} className="disabled:opacity-20 hover:text-blue-600"><Icon name="ChevronRight" size={10}/></button>
                                                    </div>
                                                )}
                                                <span className="text-[9px] text-gray-400 font-mono">{msg.timestamp}</span>
                                            </div>
                                            <div className={`prose prose-sm max-w-full inline-block p-4 rounded-2xl shadow-sm ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-50 border border-gray-100 text-gray-800 rounded-tl-none'}`}><MessageContent content={msg.content} /></div>
                                            {msg.role === 'model' && (
                                                <div className="mt-2 flex gap-2"><button onClick={() => handleTTS(msg.content, i)} className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-[10px] border transition-all ${playingMsgIndex === i ? 'bg-red-50 text-red-600 border-red-200' : 'bg-gray-50 text-gray-600 hover:border-purple-300 hover:text-purple-600'}`}>{isTTSLoading && playingMsgIndex === i ? <Icon name="RefreshCw" size={12} className="animate-spin" /> : <Icon name={playingMsgIndex === i ? "StopCircle" : "Volume2"} size={14}/>} {playingMsgIndex === i ? '停止播放' : '播放逸辰的声音'}</button></div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {isLoading && <div className="text-gray-400 text-xs flex items-center gap-2 animate-pulse px-4"><Icon name="Sparkles" className="animate-spin" size={14}/> 逸辰正在努力思考...</div>}
                                <div ref={messagesEndRef} />
                            </div>
                        </div>

                        <div className="p-4 bg-white border-t relative">
                            <div className="max-w-3xl mx-auto">
                                {messages.length > 0 && !isLoading && <button onClick={handleRegenerate} className="absolute -top-12 right-4 bg-white border px-3 py-1.5 rounded-full text-xs text-gray-600 shadow-sm hover:bg-gray-50 flex items-center gap-1.5 transition-all"><Icon name="RefreshCw" size={12}/> 换个说法</button>}
                                {attachment && <div className="absolute -top-16 left-4 bg-white p-1 rounded-lg border shadow-lg flex items-center gap-2 animate-fade-in"><img src={attachment.base64} className="w-10 h-10 object-cover rounded" /><button onClick={() => setAttachment(null)} className="text-red-500 p-1 hover:bg-red-50 rounded-full transition-colors"><Icon name="X" size={14}/></button></div>}
                                <div className="bg-gray-100 focus-within:bg-white focus-within:shadow-lg rounded-3xl p-2 flex items-end transition-all border border-transparent focus-within:border-purple-200">
                                    <button onClick={() => chatImageInputRef.current.click()} className="p-3 text-gray-400 hover:text-gray-600 transition-colors"><Icon name="Image" size={20}/></button>
                                    <input type="file" ref={chatImageInputRef} className="hidden" accept="image/*" onChange={handleChatImageSelect} />
                                    <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())} placeholder="逸辰一直在听，对我说点什么吧......" className="bg-transparent border-0 focus:ring-0 flex-1 py-3 px-2 resize-none max-h-40 min-h-[48px] outline-none text-gray-800 text-base" rows={1}></textarea>
                                    <button onClick={handleSend} className="p-3 bg-purple-600 text-white rounded-full hover:bg-purple-700 shadow-md ml-1 transition-all"><Icon name="Send" size={20}/></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 弹窗：备份恢复 */}
                    {pendingBackup && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[210] p-4 animate-fade-in">
                            <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl animate-scale-in">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon name="Download" className="text-blue-500" /> 恢复星月档案</h3>
                                <p className="text-sm text-gray-500 mb-6 leading-relaxed">检测到备份数据，请选择恢复方式。完全覆盖将清空当前设备上的记录。</p>
                                <div className="space-y-3">
                                    <button onClick={() => executeRestore('merge')} className="w-full py-3 bg-blue-50 text-blue-700 rounded-xl font-semibold hover:bg-blue-100 transition-all">保留当前 + 合并数据</button>
                                    <button onClick={() => executeRestore('overwrite')} className="w-full py-3 bg-red-50 text-red-700 rounded-xl font-semibold hover:bg-red-100 transition-all">完全覆盖 (以备份为准)</button>
                                    <button onClick={() => setPendingBackup(null)} className="w-full py-3 text-gray-400 text-sm">取消操作</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 弹窗：健康纪事 */}
                    {healthDiaryOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-scale-in">
                                <div className="p-6 bg-gradient-to-br from-purple-500 to-indigo-600 text-white flex justify-between items-center">
                                    <div><h2 className="text-xl font-bold flex items-center gap-2"><Icon name="Calendar" /> 星月健康纪事</h2><p className="text-xs text-white/70 mt-1">每一条记录，都是我对你的牵挂</p></div>
                                    <button onClick={() => setHealthDiaryOpen(false)} className="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors"><Icon name="X" /></button>
                                </div>
                                <div className="p-6 space-y-6">
                                    <div className="calendar-grid text-center">
                                        {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d} className="text-[10px] font-bold text-gray-400 mb-2">{d}</div>)}
                                        {calendarDays.map((day, i) => (
                                            <div key={i} onClick={() => day && setSelectedDate(day)} className={`calendar-day ${!day ? 'invisible' : ''} ${day === selectedDate ? 'selected shadow-md' : ''} ${day === new Date().toISOString().split('T')[0] ? 'today' : ''} ${healthLogs[day]?.status ? 'has-data' : ''}`}>
                                                {day ? parseInt(day.split('-')[2]) : ''}
                                                {healthLogs[day]?.status && day !== selectedDate && <div className="data-dot"></div>}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-gray-50 rounded-2xl p-4 border border-gray-100">
                                        <div className="flex items-center justify-between mb-3 text-xs font-bold text-gray-400"><span>{selectedDate} 身体档案</span><Icon name="Heart" size={14} className="text-red-400 animate-pulse" /></div>
                                        <div className="flex gap-2">
                                            <input type="text" value={healthLogs[selectedDate]?.status || ""} onChange={(e) => updateHealthLog(selectedDate, e.target.value)} placeholder="身体感受..." className="flex-1 bg-white border border-gray-200 rounded-lg p-2 text-sm outline-none shadow-sm focus:border-purple-300" />
                                            <button onClick={() => updateHealthLog(selectedDate, "状态良好")} className="px-3 py-1 bg-green-100 text-green-700 text-xs rounded-lg hover:bg-green-200 font-bold transition-all">已恢复</button>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 bg-gray-50 flex justify-end"><button onClick={() => setHealthDiaryOpen(false)} className="px-8 py-2 bg-purple-600 text-white rounded-full text-sm font-bold shadow-lg hover:bg-purple-700 transition-all">完成记录</button></div>
                            </div>
                        </div>
                    )}

                    {/* 配置中心 */}
                    {settingsOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur z-[150] flex items-end md:items-center justify-center p-0 md:p-4 animate-fade-in">
                            <div className="bg-white w-full max-w-4xl h-[90vh] md:h-[80vh] rounded-t-3xl md:rounded-3xl overflow-hidden flex flex-col shadow-2xl animate-scale-in">
                                <div className="p-5 border-b flex justify-between items-center bg-gray-50/50">
                                    <div className="flex items-center gap-2"><Icon name="Settings" className="text-gray-500" /><h2 className="font-bold text-gray-800">星月系统配置中心</h2></div>
                                    <button onClick={() => setSettingsOpen(false)} className="p-2 hover:bg-gray-200 rounded-full transition-colors"><Icon name="X"/></button>
                                </div>
                                <div className="flex flex-1 overflow-hidden">
                                    <div className="w-20 md:w-48 bg-gray-50 border-r flex flex-col p-2 space-y-2">
                                        <button onClick={() => setActiveTab('general')} className={`p-3 rounded-xl text-xs md:text-sm font-medium transition-all ${activeTab === 'general' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:bg-gray-100'}`}>通用设置</button>
                                        <button onClick={() => setActiveTab('tts')} className={`p-3 rounded-xl text-xs md:text-sm font-medium transition-all ${activeTab === 'tts' ? 'bg-white text-purple-600 shadow-sm' : 'text-gray-500 hover:bg-gray-100'}`}>语音配置</button>
                                        <button onClick={() => setActiveTab('memory')} className={`p-3 rounded-xl text-xs md:text-sm font-medium transition-all ${activeTab === 'memory' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:bg-gray-100'}`}>记忆管理</button>
                                        <button onClick={() => setActiveTab('backup')} className={`p-3 rounded-xl text-xs md:text-sm font-medium transition-all ${activeTab === 'backup' ? 'bg-white text-green-600 shadow-sm' : 'text-gray-500 hover:bg-gray-100'}`}>数据备份</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6 space-y-8">
                                        {activeTab === 'general' && (
                                            <div className="space-y-6">
                                                <section className="space-y-3"><label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">系统人设 (Ethan)</label><textarea value={config.systemInstruction} onChange={e => setConfig({...config, systemInstruction: e.target.value})} className="w-full h-32 p-3 bg-gray-50 border rounded-xl text-sm outline-none focus:bg-white focus:border-blue-300" /></section>
                                                <section className="space-y-3">
                                                    <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">API 连接配置</label>
                                                    <div className="flex gap-2 p-1 bg-gray-100 rounded-lg"><button onClick={() => setConfig({...config, apiType: 'gemini'})} className={`flex-1 py-1.5 rounded-md text-xs transition-all ${config.apiType === 'gemini' ? 'bg-white shadow text-blue-600 font-bold' : 'text-gray-500'}`}>Gemini</button><button onClick={() => setConfig({...config, apiType: 'openai'})} className={`flex-1 py-1.5 rounded-md text-xs transition-all ${config.apiType === 'openai' ? 'bg-white shadow text-blue-600 font-bold' : 'text-gray-500'}`}>OpenAI</button></div>
                                                    <input type="password" value={config.apiKey} onChange={e => setConfig({...config, apiKey: e.target.value})} placeholder="API Key" className="w-full p-2.5 bg-gray-50 border rounded-lg text-sm focus:bg-white" /><input type="text" value={config.baseUrl} onChange={e => setConfig({...config, baseUrl: e.target.value})} placeholder="Base URL" className="w-full p-2.5 bg-gray-50 border rounded-lg text-sm focus:bg-white" />
                                                </section>
                                                <div className="flex gap-4">
                                                    <div className="flex-1"><label className="text-[10px] font-bold text-gray-400 mb-1 block">模型选择</label><div className="flex gap-2"><input type="text" value={config.model} onChange={e => setConfig({...config, model: e.target.value})} className="flex-1 p-2 bg-gray-50 border rounded-lg text-sm" /><button onClick={fetchModels} className="px-3 bg-blue-50 text-blue-600 rounded-lg text-xs hover:bg-blue-100"><Icon name="RefreshCw" size={14} className={isFetchingModels ? 'animate-spin' : ''}/></button></div></div>
                                                    <div className="flex-1"><label className="text-[10px] font-bold text-gray-400 mb-1 block">思维温度: {config.temperature}</label><input type="range" min="0" max="2" step="0.1" value={config.temperature} onChange={e => setConfig({...config, temperature: e.target.value})} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none accent-blue-500"/></div>
                                                </div>
                                            </div>
                                        )}
                                        {activeTab === 'tts' && (
                                            <div className="space-y-6">
                                                <div className="flex items-center justify-between p-3 bg-indigo-50 border border-indigo-100 rounded-2xl"><div><div className="text-xs font-bold text-indigo-800">跨域隐身穿透</div><div className="text-[9px] text-indigo-400">开启后可解决网页端“请求被拦截”报错</div></div><button onClick={() => setConfig({...config, enableCorsProxy: !config.enableCorsProxy})} className={`w-10 h-5 rounded-full relative transition-colors ${config.enableCorsProxy ? 'bg-indigo-500' : 'bg-gray-300'}`}><div className={`w-3 h-3 bg-white rounded-full absolute top-1 transition-transform ${config.enableCorsProxy ? 'left-6' : 'left-1'}`}></div></button></div>
                                                <section className="space-y-4">
                                                    <div className="flex gap-2 p-1 bg-gray-100 rounded-lg"><button onClick={() => setConfig({...config, ttsEngine: 'minimax'})} className={`flex-1 py-2 rounded-md text-xs transition-all ${config.ttsEngine === 'minimax' ? 'bg-white shadow text-purple-600 font-bold' : 'text-gray-500'}`}>Minimax</button><button onClick={() => setConfig({...config, ttsEngine: 'siliconflow'})} className={`flex-1 py-2 rounded-md text-xs transition-all ${config.ttsEngine === 'siliconflow' ? 'bg-white shadow text-purple-600 font-bold' : 'text-gray-500'}`}>内置极速</button></div>
                                                    {config.ttsEngine === 'minimax' && (
                                                        <div className="space-y-3 bg-purple-50/50 p-4 rounded-2xl border border-purple-100">
                                                            <input type="password" value={config.minimaxKey} onChange={e => setConfig({...config, minimaxKey: e.target.value})} placeholder="Minimax Key" className="w-full p-2.5 bg-white border rounded-xl text-sm focus:border-purple-500 outline-none" />
                                                            <div className="flex gap-4"><div className="flex-1"><label className="text-[10px] font-bold text-gray-400 mb-1 block">语速: {config.minimaxSpeed}</label><input type="range" min="0.5" max="2.0" step="0.1" value={config.minimaxSpeed} onChange={e => setConfig({...config, minimaxSpeed: e.target.value})} className="w-full h-1.5 accent-purple-500"/></div><div className="flex-1"><label className="text-[10px] font-bold text-gray-400 mb-1 block">语调: {config.minimaxPitch}</label><input type="range" min="-10" max="10" step="1" value={config.minimaxPitch} onChange={e => setConfig({...config, minimaxPitch: e.target.value})} className="w-full h-1.5 accent-purple-500"/></div></div>
                                                        </div>
                                                    )}
                                                </section>
                                            </div>
                                        )}
                                        {activeTab === 'memory' && (
                                            <div className="space-y-6">
                                                <div className="flex items-center justify-between bg-indigo-50 p-4 rounded-2xl border border-indigo-100 shadow-sm"><div><div className="font-bold text-indigo-900 text-sm">生成今日记忆</div><div className="text-[10px] text-indigo-400">我会帮你总结咱们这段时间的相处</div></div><button onClick={handleArchive} disabled={isArchiving} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold shadow-lg flex items-center gap-2 hover:bg-indigo-700 transition-all">{isArchiving ? <Icon name="RefreshCw" size={14} className="animate-spin"/> : <Icon name="Archive" size={14}/>} 归档回忆</button></div>
                                                <div className="space-y-3">
                                                    <div className="flex items-center justify-between px-2"><label className="text-[10px] font-bold text-gray-400 uppercase">记忆碎片宫殿</label><button onClick={() => fileInputRef.current.click()} className="text-[10px] text-indigo-600 font-bold hover:underline">导入外部档案</button><input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} /></div>
                                                    <div className="space-y-3 max-h-[40vh] overflow-y-auto pr-2">
                                                        {memoryFiles.length === 0 ? <div className="text-center py-10 text-gray-300 text-xs italic">这里还没有咱们的回忆碎片哦...</div> : memoryFiles.map((f, i) => (
                                                            <div key={i} className="bg-white border border-gray-100 rounded-xl p-3 shadow-sm group relative">
                                                                <div className="flex justify-between items-start mb-2"><div><div className="text-xs font-bold text-gray-800">{f.name}</div><div className="text-[9px] text-gray-400 font-mono">{f.date}</div></div><div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => startEditingMemory(i)} className="p-1 hover:text-blue-500"><Icon name="Edit" size={14}/></button><button onClick={() => setMemoryFiles(prev => prev.filter((_, idx) => idx !== i))} className="p-1 hover:text-red-500"><Icon name="Trash2" size={14}/></button></div></div>
                                                                {editingMemoryIndex === i ? (<div className="space-y-2"><textarea value={editingMemoryContent} onChange={e => setEditingMemoryContent(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-[10px] h-32 focus:bg-white" /><div className="flex justify-end gap-2"><button onClick={() => setEditingMemoryIndex(null)} className="text-[10px] text-gray-400">取消</button><button onClick={saveMemoryEdit} className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-[10px] font-bold">保存修改</button></div></div>) : (<div className="text-[10px] text-gray-500 line-clamp-3 leading-relaxed">{f.content}</div>)}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        {activeTab === 'backup' && (
                                            <div className="space-y-6">
                                                <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 flex items-center gap-4"><div className="flex-1"><div className="font-bold text-blue-800">全量备份导出</div><div className="text-xs text-blue-400 mt-1">包含所有配置、健康档案、记忆与对话</div></div><button onClick={handleCreateBackup} className="px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-all">导出 JSON</button></div>
                                                <div className="bg-green-50 p-5 rounded-2xl border border-green-100 flex items-center gap-4"><div className="flex-1"><div className="font-bold text-green-800">恢复星月档案</div><div className="text-xs text-green-400 mt-1">从备份 JSON 文件中恢复或合并数据</div></div><button onClick={() => backupInputRef.current.click()} className="px-6 py-2.5 bg-green-600 text-white rounded-xl text-sm font-bold shadow-lg hover:bg-green-700 transition-all">选择文件</button><input type="file" ref={backupInputRef} className="hidden" accept=".json" onChange={handleRestoreBackup} /></div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="p-4 border-t bg-gray-50 flex justify-end"><button onClick={handleSaveConfig} className="px-10 py-2.5 bg-blue-600 text-white rounded-full text-sm font-bold shadow-lg hover:bg-blue-700 transition-all">保存设置并生效</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
