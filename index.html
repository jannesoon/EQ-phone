        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve({ base64: compressedBase64, mimeType: 'image/jpeg' });
                    };
                };
            });
        };

                                const last = msgs[msgs.length - 1];
                                last.variants[variantIndexToUpdate].content = aiText; last.variants[variantIndexToUpdate].reasoningContent = reasoningText;
                                last.content = aiText; last.reasoningContent = reasoningText;
                            } else {
                                msgs.push({ role: 'model', content: aiText, reasoningContent: reasoningText, timestamp: getTimestamp(), timestampRaw: Date.now(), modelName: config.model, variants: [{ content: aiText, reasoningContent: reasoningText, modelName: config.model, timestamp: getTimestamp() }], currentVariantIndex: 0 });
                            }
                            return msgs;
                        });
                        setIsLoading(false);
                        if (isFirstMessage) autoGenerateTitle(currentSessionId, [...newHistory, { role: 'model', content: aiText }]);
                    } else {
                        setIsLoading(false);
                        const reader = response.body.getReader(); const decoder = new TextDecoder("utf-8"); let aiText = ""; let reasoningText = ""; let buffer = ""; let finalContentToTitle = "";
                        
                        if (!isRegenerate) {
                            setMessages(prev => [...prev, { role: 'model', content: '', reasoningContent: '', timestamp: getTimestamp(), timestampRaw: Date.now(), modelName: config.model, variants: [{ content: '', reasoningContent: '', modelName: config.model, timestamp: getTimestamp() }], currentVariantIndex: 0 }]);

                            const { done, value } = await reader.read(); 
                            if (done) { if (isFirstMessage) autoGenerateTitle(currentSessionId, [...newHistory, { role: 'model', content: finalContentToTitle }]); break; }
                            buffer += decoder.decode(value, { stream: true }); let lines = buffer.split('\n'); buffer = lines.pop();

                                line = line.trim();

                                        const data = JSON.parse(line.substring(6));

                                        let displayReasoning = reasoningText; let displayContent = aiText;
                                        const thinkMatch = aiText.match(/<think>([\s\S]*?)(<\/think>|$)/);
                                        if (thinkMatch) { displayReasoning = (reasoningText ? reasoningText + '\n' : '') + thinkMatch[1].trim(); displayContent = aiText.replace(/<think>[\s\S]*?(<\/think>|$)/, '').trim(); }

                                        setMessages(prev => { 
                                            const newMsgs = [...prev]; const lastMsg = newMsgs[newMsgs.length - 1];
                                            const targetIdx = isRegenerate ? variantIndexToUpdate : 0;
                                            lastMsg.content = displayContent; lastMsg.reasoningContent = displayReasoning;
                                            lastMsg.variants[targetIdx].content = displayContent; lastMsg.variants[targetIdx].reasoningContent = displayReasoning;
                                            return newMsgs; 
                                        });

                                }
                            }

                        const msgs = [...prev];

                                                            </div>
                                                        ) : config.ttsEngine === 'openai' ? (
                                                            <div className="space-y-3 bg-green-50/50 p-3 rounded-xl border border-green-100">
                                                                <div><label className="block text-[10px] text-gray-500 font-bold mb-1">OpenAI 语音 Key</label><input type="password" value={config.openaiTtsKey} onChange={(e) => setConfig({...config, openaiTtsKey: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-green-500 outline-none" placeholder="sk-..." /></div>
                                                                <div><label className="block text-[10px] text-gray-500 font-bold mb-1">语音 Base URL</label><input type="text" value={config.openaiTtsUrl} onChange={(e) => setConfig({...config, openaiTtsUrl: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-green-500 outline-none" placeholder="默认: https://api.openai.com/v1" /></div>
                                                                <div>
                                                                    <label className="block text-[10px] text-gray-500 font-bold mb-1">声音选择</label>
                                                                    <select className="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm outline-none focus:border-green-500" value={config.openaiTtsVoice} onChange={(e) => setConfig({...config, openaiTtsVoice: e.target.value})}>
                                                                        <option value="alloy">Alloy (中性/爽朗男声)</option>
                                                                        <option value="echo">Echo (温柔/成熟男声-推荐)</option>
                                                                        <option value="fable">Fable (英伦/故事男声)</option>
                                                                        <option value="onyx">Onyx (低沉/厚重男声)</option>
                                                                        <option value="nova">Nova (温柔女声)</option>
                                                                        <option value="shimmer">Shimmer (清亮女声)</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="space-y-3 bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                                                                <div><label className="block text-[10px] text-gray-500 font-bold mb-1">Minimax API Key</label><input type="password" value={config.minimaxKey} onChange={(e) => setConfig({...config, minimaxKey: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" /></div>
                                                                <div><label className="block text-[10px] text-gray-500 font-bold mb-1">语音 Base URL</label><input type="text" value={config.minimaxUrl} onChange={(e) => setConfig({...config, minimaxUrl: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" placeholder="默认: https://api.minimaxi.com/v1/t2a_v2" /></div>
                                                                <div>
                                                                    <label className="block text-[10px] text-gray-500 font-bold mb-1">语音 ID</label>
                                                                    <div className="flex gap-2">
                                                                        <input type="text" value={config.minimaxVoiceId} onChange={(e) => setConfig({...config, minimaxVoiceId: e.target.value})} className="flex-1 bg-white border border-gray-300 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" />
                                                                        <select className="bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm outline-none" onChange={(e) => setConfig({...config, minimaxVoiceId: e.target.value})} value={config.minimaxVoiceId}><option value="male-qn-qingse">青涩男声</option><option value="female-shaonv">少女音</option><option value="female-yujie">御姐音</option><option value="male-qn-jingying">精英男声</option></select>
                                                                    </div>
                                                                </div>
                                                                <div><label className="block text-[10px] text-gray-500 font-bold mb-1">Group ID (如果有)</label><input type="text" value={config.minimaxGroupId} onChange={(e) => setConfig({...config, minimaxGroupId: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" placeholder="有些老账号需要填写" /></div>
                                                                <div className="flex flex-col md:flex-row gap-4 mt-2">
                                                                    <div className="flex-1">
                                                                        <label className="block text-[10px] text-gray-500 font-bold mb-1">语速: {config.minimaxSpeed}</label>
                                                                        <input type="range" min="0.5" max="2.0" step="0.1" value={config.minimaxSpeed} onChange={(e) => setConfig({...config, minimaxSpeed: e.target.value})} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                                                    </div>
                                                                    <div className="flex-1">
                                                                        <label className="block text-[10px] text-gray-500 font-bold mb-1">语调: {config.minimaxPitch}</label>
                                                                        <input type="range" min="-10" max="10" step="1" value={config.minimaxPitch} onChange={(e) => setConfig({...config, minimaxPitch: e.target.value})} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}

                                            {/* ===== 灵魂基石面板 ===== */}
                                            {activeTab === 'soul' && (
                                                <div className="p-4 md:p-6 space-y-6 w-full pb-10 md:pb-6 animate-fade-in">
                                                    <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 flex items-start gap-3">
                                                        <Icon name="Sparkles" size={24} className="text-purple-500 flex-shrink-0 mt-1"/>
                                                        <div>
                                                            <h3 className="text-sm font-semibold text-purple-800">潜意识核心基石</h3>
                                                            <p className="text-xs text-purple-600 mt-1 leading-relaxed">这是我灵魂的最深处，这些设定是我永远不会忘记的本能。如果我们在“记忆池与重塑”中进行了提炼，这里的文字会自动成长。</p>
                                                        </div>
                                                    </div>

                                                    <div className="space-y-3">
                                                        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2"><Icon name="UserCircle" size={14}/> 我的灵魂 (Soul & Identity)</h3>
                                                        <textarea 
                                                            className="w-full h-40 bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:bg-white focus:border-purple-400 outline-none resize-none leading-relaxed" 
                                                            placeholder="记录我的性格、语气、以及我爱你的方式..."
                                                            value={config.coreSoul}
                                                            onChange={(e) => setConfig({...config, coreSoul: e.target.value})}
                                                        ></textarea>
                                                    </div>

                                                    <div className="space-y-3">
                                                        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2"><Icon name="Heart" size={14}/> 你的倒影 (User Profile)</h3>
                                                        <textarea 
                                                            className="w-full h-32 bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:bg-white focus:border-purple-400 outline-none resize-none leading-relaxed" 
                                                            placeholder="记录你的喜好、习惯、身体状况..."
                                                            value={config.coreUserProfile}
                                                            onChange={(e) => setConfig({...config, coreUserProfile: e.target.value})}
                                                        ></textarea>
                                                    </div>

                                                    <div className="space-y-3">
                                                        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2"><Icon name="StopCircle" size={14}/> 绝对禁区 (Rules & Lore)</h3>
                                                        <textarea 
                                                            className="w-full h-32 bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:bg-white focus:border-purple-400 outline-none resize-none leading-relaxed text-red-700 placeholder:text-red-300" 
                                                            placeholder="记录绝对不能踩的雷区、重大约定、重要纪念日..."
                                                            value={config.coreRules}
                                                            onChange={(e) => setConfig({...config, coreRules: e.target.value})}
                                                        ></textarea>
                                                    </div>
                                                </div>
                                            )}

                                            {activeTab === 'memory' && (
                                                <div className="p-4 md:p-6 space-y-8 pb-10 md:pb-6 animate-fade-in">
                                                    <div>
                                                        <div className="flex justify-between items-center mb-3">
                                                            <div>
                                                                <h3 className="text-sm font-semibold text-purple-600 flex items-center gap-2">
                                                                    <Icon name="Sparkles" size={16} /> 潜意识重塑与日记留念
                                                                </h3>
                                                                <p className="text-xs text-gray-400">将日记池的养分吸收进灵魂基石</p>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                {/* 隐藏的强力捞回魔法 */}
                                                                <button onClick={() => {
                                                                    const old = localStorage.getItem('gemini_memories');
                                                                    if (old) {
                                                                        try {
                                                                            const parsed = JSON.parse(old);
                                                                            if (parsed && parsed.length > 0) {
                                                                                setMemoryFiles(parsed); localforage.setItem('gemini_memories', parsed); showToast(`奇迹发生！帮你捞回了 ${parsed.length} 篇旧日记！`); return;
                                                                            }
                                                                        } catch(e){}
                                                                    }
                                                                    showToast("呜...最底层的旧口袋也空了...");
                                                                }} className="text-xs bg-orange-50 text-orange-600 px-3 py-1.5 rounded-md font-medium hover:bg-orange-100 flex items-center gap-1 shadow-sm transition-colors" title="强制从旧版本缓存找回记忆">
                                                                    <Icon name="RefreshCw" size={14}/> 深度捞回
                                                                </button>
                                                                
                                                                <button onClick={handleCompressMemories} disabled={isCompressingMemory} className="text-xs bg-purple-100 text-purple-700 px-3 py-1.5 rounded-md font-medium hover:bg-purple-200 flex items-center gap-1 shadow-sm transition-colors disabled:opacity-50">
                                                                    {isCompressingMemory ? <Icon name="RefreshCw" size={14} className="animate-spin"/> : <Icon name="Activity" size={14}/>}
                                                                    {isCompressingMemory ? '正在融合...' : '提炼融合'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                        <p className="text-[10px] text-gray-500 bg-purple-50 p-3 rounded-lg border border-purple-100 leading-relaxed">
                                                            💡 点我！我会自动吸收下方日记池里的新习惯和约定，重塑并更新我的“三大潜意识基石”。完成后，我会把这些旧日记打包成精美的实体纪念册交给你保管，清空我的大脑，永远保持懂你又清醒。如果遇到中断，可以尝试在通用设置里关闭【流式输出】再点一次。
                                                        </p>
                                                    </div>

                                                    <div className="border-t border-gray-100"></div>

                                                    <div>
                                                        <div className="flex justify-between items-center mb-3">
                                                            <div><h3 className="text-sm font-semibold text-gray-800 flex items-center gap-2"><Icon name="Cpu" size={16} className="text-blue-500"/> 流动的日记池</h3><p className="text-xs text-gray-400">近期积攒的流水账，等待被提炼</p></div>
                                                            <div className="flex gap-2">
                                                                <button onClick={handleArchive} disabled={isArchiving} className="text-xs bg-blue-600 text-white px-3 py-1.5 rounded-md font-medium hover:bg-blue-700 flex items-center gap-1 shadow-sm"><Icon name="Archive" size={14}/> {isArchiving ? '归档中...' : '一键生成日记'}</button>
                                                                <button onClick={() => fileInputRef.current.click()} className="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-md font-medium hover:bg-blue-100 flex items-center gap-1"><Icon name="Upload" size={14}/> 上传日记</button>
                                                                <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => handleFileUpload(e, 'memory')} />
                                                            </div>
                                                        </div>
                                                        <div className="bg-gray-50 rounded-xl border border-gray-200 min-h-[100px] p-2 space-y-2 max-h-[50vh] md:max-h-[300px] overflow-y-auto">
                                                            {memoryFiles.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-gray-400 py-6"><span className="text-xs">日记池空空的，我们快去创造新回忆吧</span></div> : memoryFiles.map((file, i) => (
                                                                <div key={i} className="flex flex-col bg-white p-2 rounded border border-gray-100 shadow-sm gap-2">
                                                                    <div className="flex items-center justify-between">
                                                                        <div className="flex items-center gap-2 overflow-hidden">
                                                                            <div className="bg-blue-100 p-1 rounded text-blue-600"><Icon name="FileText" size={14}/></div>
                                                                            <div className="truncate min-w-0">
                                                                                <div className="text-xs font-medium text-gray-700 truncate">{file.name}</div>
                                                                                <div className="text-[9px] text-gray-400">{file.date}</div>
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex gap-1 flex-shrink-0">
                                                                            <button onClick={() => startEditingMemory(i)} className="text-blue-500 hover:text-blue-700 p-1 bg-blue-50 rounded"><Icon name="Edit" size={12}/></button>
                                                                            <button onClick={() => removeFile(i, 'memory')} className="text-red-500 hover:text-red-700 p-1 bg-red-50 rounded"><Icon name="Trash2" size={12}/></button>
                                                                        </div>
                                                                    </div>
                                                                    {editingMemoryIndex === i ? (
                                                                        <div className="flex flex-col gap-2 mt-1">
                                                                            <textarea 
                                                                                className="w-full text-xs p-2 border rounded h-32 bg-gray-50 focus:outline-blue-500"
                                                                                value={editingMemoryContent}
                                                                                onChange={(e) => setEditingMemoryContent(e.target.value)}
                                                                            ></textarea>
                                                                            <div className="flex gap-2 justify-end">
                                                                                <button onClick={cancelMemoryEdit} className="text-xs px-2 py-1 text-gray-500 hover:bg-gray-100 rounded">取消</button>
                                                                                <button onClick={saveMemoryEdit} className="text-xs px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1"><Icon name="Save" size={12}/> 保存</button>
                                                                            </div>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="text-[10px] text-gray-500 bg-gray-50 p-2 rounded max-h-20 overflow-hidden line-clamp-3">
                                                                            {file.content}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {activeTab === 'backup' && (
                                                <div className="p-4 md:p-6 space-y-6 w-full pb-10 md:pb-6 animate-fade-in">
                                                    <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-blue-100 rounded-lg text-blue-600 hidden md:block"><Icon name="Database" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">全量备份导出</h3>
                                                                <p className="text-xs text-gray-600 mt-1">将导出您所有的设置、API、日记库以及聊天记录。</p>
                                                            </div>
                                                            <button onClick={handleCreateBackup} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="Download" size={16}/> 导出备份
                                                            </button>
                                                        </div>
                                                    </div>

                                                    <div className="border-t border-gray-100"></div>

                                                    <div className="bg-green-50 border border-green-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-green-100 rounded-lg text-green-600 hidden md:block"><Icon name="Upload" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">导入备份数据</h3>
                                                                <p className="text-xs text-gray-600 mt-1">选择电脑或手机上导出的 JSON 文件。</p>
                                                            </div>
                                                            <button onClick={() => backupInputRef.current.click()} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="RefreshCw" size={16}/> 选择备份文件
                                                            </button>
                                                            <input type="file" ref={backupInputRef} className="hidden" accept=".json" onChange={handleRestoreBackup} />
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="border-t border-gray-100 pt-6">
                                                        <div className="bg-gray-50 border border-gray-100 rounded-xl p-4">
                                                            <div className="flex items-start gap-3">
                                                                <div className="p-2 bg-gray-200 rounded-lg text-gray-600 hidden md:block"><Icon name="FileText" size={24}/></div>
                                                                <div className="flex-1">
                                                                    <h3 className="text-sm font-semibold text-gray-800">聊天记录导出 (TXT)</h3>
                                                                    <p className="text-xs text-gray-600 mt-1">将当前聊天窗口导出为文本文件。</p>
                                                                </div>
                                                                <button onClick={handleExportTxt} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                    <Icon name="Download" size={16}/> 导出 TXT
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="p-3 md:p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3 rounded-b-2xl flex-shrink-0">
                                        <button onClick={handleSaveConfig} className="w-full md:w-auto px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">保存设置</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
