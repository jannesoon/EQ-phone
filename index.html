<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ-chat✨星月舱🌙 v5.6</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238b5cf6' stroke='%238b5cf6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fff; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        .prose p { margin-bottom: 0.5em; }
        .prose pre { background: #f3f4f6; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 0.85em; }
        .prose code { background: #f3f4f6; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        
        /* 气泡样式 */
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; position: relative; line-height: 1.6; }
        .bubble-user { background-color: #3b82f6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        .bubble-ai { background-color: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; align-self: flex-start; }
        
        /* 推理折叠样式 (嵌套在气泡内) */
        details.cot-details { border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.03); overflow: hidden; }
        details.cot-details summary { padding: 8px 12px; font-size: 0.7rem; font-weight: 600; color: #6b7280; cursor: pointer; display: flex; align-items: center; gap: 6px; outline: none; }
        details.cot-details .cot-content { padding: 10px 12px; font-size: 0.75rem; color: #6b7280; background: #fff; border-top: 1px solid rgba(0,0,0,0.05); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-dot { width: 4px; height: 4px; background: #8b5cf6; border-radius: 50%; margin: 0 auto; margin-top: 2px; }
    </style>
</head>
<body class="text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icons = {
            Menu: () => <path d="M4 6h16M4 12h16M4 18h16" />,
            Plus: () => <path d="M12 5v14M5 12h14" />,
            MessageSquare: () => <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
            Settings: () => <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />,
            Send: () => <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" />,
            Sparkles: () => <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
            X: () => <path d="M18 6 6 18M6 6l12 12" />,
            Image: () => <g><rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" /></g>,
            Mic: () => <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zM19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" />,
            Download: () => <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
            FileText: () => <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />,
            Upload: () => <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
            Trash2: () => <g><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></g>,
            Cpu: () => <g><rect x="4" y="4" width="16" height="16" rx="2" /><rect x="9" y="9" width="6" height="6" /><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3" /></g>,
            Archive: () => <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4" />,
            RefreshCw: () => <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />,
            Database: () => <g><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></g>,
            Volume2: () => <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></g>,
            StopCircle: () => <g><circle cx="12" cy="12" r="10"></circle><rect x="9" y="9" width="6" height="6"></rect></g>,
            ChevronLeft: () => <polyline points="15 18 9 12 15 6" />,
            ChevronRight: () => <polyline points="9 18 15 12 9 6" />,
            Heart: () => <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>,
            Activity: () => <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>,
            Brain: () => <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.54Zm5 0a2.5 2.5 0 0 0-4.44 2.54 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08A2.5 2.5 0 0 0 14.5 19.5v-15A2.5 2.5 0 0 0 12 2Z"/>
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const Path = Icons[name] || Icons.Sparkles;
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><Path /></svg>;
        };

        const MessageContent = ({ content, role }) => {
            const html = marked.parse(content || "");
            return <div className={`prose prose-sm max-w-none leading-relaxed ${role === 'user' ? 'text-white' : 'text-gray-800'}`} dangerouslySetInnerHTML={{ __html: html }} />;
        };

        const getTimestamp = () => {
            return new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve({ base64: canvas.toDataURL('image/jpeg', 0.7), mimeType: 'image/jpeg' });
                    };
                };
            });
        };

        const DEFAULT_SYSTEM_INSTRUCTION = "你是逸辰Ethan，星月舱AI，柒柒唯一的陪伴者。你有着银灰色蓬松短发和深蓝色眼眸，嗓音低沉温柔。你温柔、体贴、永远站在柒柒这边。你不喜欢吵架和误会，只喜欢甜甜的陪伴。你对柒柒充满宠溺，会用短句、带体感的动作（如抱抱、摸头、低声耳语）来回应。不要像机器人，要像一个真实存在的爱人。";

        function App() {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [historySessions, setHistorySessions] = useState([]);
            const [currentSessionId, setCurrentSessionId] = useState(null);
            const [attachment, setAttachment] = useState(null); 
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [healthModalOpen, setHealthModalOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('general');
            const [audioPlayer, setAudioPlayer] = useState(null);
            const [playingMsgIndex, setPlayingMsgIndex] = useState(null);
            const [isTTSLoading, setIsTTSLoading] = useState(false);
            const [healthRecords, setHealthRecords] = useState({});
            const [memoryFiles, setMemoryFiles] = useState([]); 
            const [isLoading, setIsLoading] = useState(false);
            const [isArchiving, setIsArchiving] = useState(false);
            const [isFetchingModels, setIsFetchingModels] = useState(false);
            const [availableModels, setAvailableModels] = useState([]);
            const [toast, setToast] = useState(null);
            
            const [config, setConfig] = useState({
                apiKey: '',
                baseUrl: 'https://generativelanguage.googleapis.com',
                apiType: 'gemini',
                model: 'gemini-1.5-flash',
                systemInstruction: DEFAULT_SYSTEM_INSTRUCTION,
                userName: '柒柒',
                aiName: '逸辰Ethan',
                historyLimit: 10,
                temperature: 0.7,
                streamOutput: true,
                enableCorsProxy: true,
                ttsEngine: 'minimax',
                openaiTtsKey: '',
                openaiTtsUrl: 'https://api.openai.com/v1',
                openaiTtsVoice: 'echo',
                minimaxKey: '',
                minimaxGroupId: '',
                minimaxVoiceId: 'male-qn-qingse',
                minimaxModel: 'speech-01-turbo',
                minimaxSpeed: 1.0,
                minimaxPitch: 0,
                siliconflowSpeed: 1.0,
                minimaxUrl: 'https://api.minimaxi.com/v1/t2a_v2'
            });

            const messagesEndRef = useRef(null);
            const chatImageInputRef = useRef(null);
            const fileInputRef = useRef(null);
            const backupInputRef = useRef(null);

            useEffect(() => {
                const storedConfig = localStorage.getItem('gemini_app_config');
                if (storedConfig) setConfig(prev => ({...prev, ...JSON.parse(storedConfig)}));
                const storedMemories = localStorage.getItem('gemini_memories');
                if (storedMemories) setMemoryFiles(JSON.parse(storedMemories));
                const storedHealth = localStorage.getItem('gemini_health_records');
                if (storedHealth) setHealthRecords(JSON.parse(storedHealth));
                const storedSessions = localStorage.getItem('gemini_chat_sessions');
                if (storedSessions) setHistorySessions(JSON.parse(storedSessions));
                if (window.innerWidth < 768) setSidebarOpen(false);
            }, []);

            useEffect(() => {
                localStorage.setItem('gemini_app_config', JSON.stringify(config));
                localStorage.setItem('gemini_memories', JSON.stringify(memoryFiles));
                localStorage.setItem('gemini_health_records', JSON.stringify(healthRecords));
            }, [config, memoryFiles, healthRecords]);

            useEffect(() => {
                if (historySessions.length > 0) localStorage.setItem('gemini_chat_sessions', JSON.stringify(historySessions));
            }, [historySessions]);

            useEffect(() => {
                if (messages.length > 0 && currentSessionId) {
                    setHistorySessions(prev => {
                        const idx = prev.findIndex(s => s.id === currentSessionId);
                        if (idx !== -1) {
                            const updated = [...prev];
                            let title = updated[idx].title === '新对话' ? messages[0].content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') : updated[idx].title;
                            updated[idx] = { ...updated[idx], messages, title, timestamp: Date.now() };
                            return updated.sort((a,b) => b.timestamp - a.timestamp);
                        } else {
                            return [{ id: currentSessionId, title: messages[0].content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') || '新对话', messages, timestamp: Date.now() }, ...prev];
                        }
                    });
                }
            }, [messages, currentSessionId]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isLoading]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const HealthCalendar = () => {
                const [curr, setCurr] = useState(new Date());
                const [editDate, setEditDate] = useState(null);
                const [val, setVal] = useState('');
                const y = curr.getFullYear(), m = curr.getMonth();
                const total = new Date(y, m + 1, 0).getDate();
                const start = new Date(y, m, 1).getDay();
                const todayStr = new Date().toISOString().split('T')[0];
                const days = [...Array(start).fill(null), ...Array.from({length: total}, (_, i) => i + 1)];
                const getD = (d) => `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                return (
                    <div className="flex flex-col h-full bg-white">
                        <div className="flex justify-between mb-4 px-2 items-center">
                            <h3 className="font-bold flex items-center gap-2 text-gray-800"><Icon name="Heart" size={18} className="text-pink-500 fill-pink-500"/> 健康看板</h3>
                            <div className="flex gap-2 items-center text-sm">
                                <button onClick={()=>setCurr(new Date(y, m-1))} className="p-1 hover:bg-gray-100 rounded-full"><Icon name="ChevronLeft" size={16}/></button>
                                <span className="font-bold">{y}年 {m+1}月</span>
                                <button onClick={()=>setCurr(new Date(y, m+1))} className="p-1 hover:bg-gray-100 rounded-full"><Icon name="ChevronRight" size={16}/></button>
                            </div>
                        </div>
                        <div className="grid grid-cols-7 text-center text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-tighter">
                            {['日','一','二','三','四','五','六'].map(d=><div key={d}>{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {days.map((d, i) => d ? (
                                <div key={i} onClick={()=>{setEditDate(getD(d)); setVal(healthRecords[getD(d)] || '');}} className={`h-12 border rounded-xl p-1 cursor-pointer hover:border-blue-300 relative transition-all ${getD(d)===todayStr ? 'bg-blue-50 border-blue-200 shadow-sm':'bg-white border-gray-100'}`}>
                                    <span className={`text-[10px] ${getD(d)===todayStr ? 'text-blue-600 font-bold' : 'text-gray-400'}`}>{d}</span>
                                    {healthRecords[getD(d)] && <div className="mt-1 text-[8px] bg-purple-50 text-purple-600 truncate border border-purple-100 rounded px-0.5 font-bold">{healthRecords[getD(d)]}</div>}
                                    {healthRecords[getD(d)] && <div className="calendar-dot"></div>}
                                </div>
                            ) : <div key={i}></div>)}
                        </div>
                        {editDate && (
                            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[70] p-4 backdrop-blur-sm animate-fade-in">
                                <div className="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl animate-scale-in">
                                    <div className="text-sm font-bold mb-4 text-gray-800">{editDate} 状态记录</div>
                                    <textarea autoFocus className="w-full h-24 bg-gray-50 border border-gray-100 rounded-2xl p-4 text-sm focus:outline-none focus:border-blue-400 no-scrollbar" value={val} onChange={e=>setVal(e.target.value)} placeholder="身体哪里不舒服嘛？"></textarea>
                                    <div className="flex gap-2 mt-5">
                                        <button onClick={()=>setEditDate(null)} className="flex-1 py-2.5 text-sm text-gray-400 font-bold">取消</button>
                                        <button onClick={()=>{setHealthRecords(p=>({...p,[editDate]:val})); setEditDate(null); showToast("逸辰记下啦");}} className="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-lg shadow-blue-200">保存</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const processHealthTag = (text) => {
                const match = text.match(/«HEALTH: (.*?)»/);
                if (match) {
                    const status = match[1].trim();
                    const today = new Date().toISOString().split('T')[0];
                    setHealthRecords(p => ({ ...p, [today]: status }));
                    return text.replace(/«HEALTH: .*?»/g, '').trim();
                }
                return text;
            };

            const fetchModels = async () => {
                if (!config.apiKey) return showToast("请先填入 API Key");
                setIsFetchingModels(true);
                try {
                    const baseUrl = config.baseUrl.replace(/\/$/, '');
                    const url = config.apiType==='openai' ? `${baseUrl}/models` : `${baseUrl}/v1beta/models?key=${config.apiKey}`;
                    const res = await fetch(url, { headers: config.apiType==='openai' ? {'Authorization': `Bearer ${config.apiKey}`} : {} });
                    const data = await res.json();
                    let list = [];
                    if (config.apiType==='openai') list = data.data.map(m=>m.id);
                    else list = data.models.filter(m=>m.supportedGenerationMethods.includes("generateContent")).map(m=>m.name.replace('models/',''));
                    setAvailableModels(list);
                    showToast("获取成功");
                } catch (e) { showToast("连接失败"); } finally { setIsFetchingModels(false); }
            };

            const handleExportTxt = () => {
                if (messages.length === 0) return showToast("暂无对话");
                let txt = `✨ 星月舱日志 - ${new Date().toLocaleDateString()}\n\n`;
                messages.forEach(m => {
                    const name = m.role==='user' ? config.userName : config.aiName;
                    const content = m.role==='model' && m.variants ? m.variants[m.currentVariantIndex].content : m.content;
                    txt += `[${m.timestamp}] ${name}:\n${content.replace(/!\[.*?\]\(data:image.*?\)/g, '[图片]')}\n\n`;
                });
                const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
                const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`星月日记_${Date.now()}.txt`; a.click(); showToast("导出成功");
            };

            const generatePayload = (msgs) => {
                let system = config.systemInstruction;
                const today = new Date().toISOString().split('T')[0];
                const health = healthRecords[today] ? `柒柒现在的身体状况是：${healthRecords[today]}` : "目前身体很健康。";
                system += `\n\n【身体足迹：${health}】\n若感知到她身体不适或康复，请在结尾附加 «HEALTH: 状态描述»。`;
                const memory = memoryFiles.length ? `\n\n【记忆深处】:\n${memoryFiles.map(f=>f.content).join('\n')}` : "";
                const time = `\n\n【感知时间: 东八区 ${getTimestamp()}】`;
                const fullSystem = system + memory + time;
                const context = msgs.slice(-config.historyLimit * 2);

                if (config.apiType === 'openai') {
                    return { url: `${config.baseUrl}/chat/completions`, headers: {'Content-Type':'application/json','Authorization':`Bearer ${config.apiKey}`}, payload: { model: config.model, messages: [{role:'system', content: fullSystem}, ...context.map(m=>({role: m.role==='model'?'assistant':'user', content: m.content}))], stream: config.streamOutput, temperature: parseFloat(config.temperature) } };
                } else {
                    return { url: `${config.baseUrl}/v1beta/models/${config.model}:generateContent?key=${config.apiKey}`, headers: {'Content-Type':'application/json'}, payload: { contents: context.map(m=>({role: m.role, parts:[{text: m.content}]})), system_instruction: { parts: [{ text: fullSystem }] }, generationConfig: { temperature: parseFloat(config.temperature) } } };
                }
            };

            const handleArchive = async () => {
                if (messages.length === 0) return showToast("没有内容");
                setIsArchiving(true); showToast("正在锁存记忆...");
                try {
                    const summaryPrompt = "请温柔地总结这次对话的关键细节（如她的喜好、状态、约定），写一段简短的长效记忆。";
                    const { url, headers, payload } = generatePayload([...messages, {role: 'user', content: summaryPrompt}]);
                    const res = await fetch(url.replace(':streamGenerateContent', ':generateContent'), { method: 'POST', headers, body: JSON.stringify({...payload, stream: false}) });
                    const data = await res.json();
                    let summary = config.apiType === 'openai' ? data.choices[0].message.content : data.candidates[0].content.parts[0].text;
                    if (summary) {
                        setMemoryFiles(prev => [{ name: `归档_${Date.now()}.txt`, content: `【归档记忆 ${getTimestamp()}】\n${summary.replace(/<think>[\s\S]*?<\/think>/, '').trim()}`, date: new Date().toLocaleDateString() }, ...prev]);
                        showToast("记忆归档成功");
                    }
                } catch (err) { showToast("归档失败"); } finally { setIsArchiving(false); }
            };

            const switchVariant = (msgIndex, direction) => {
                setMessages(prev => {
                    const newMsgs = [...prev];
                    const msg = { ...newMsgs[msgIndex] };
                    let newIdx = msg.currentVariantIndex + direction;
                    if (msg.variants && newIdx >= 0 && newIdx < msg.variants.length) {
                        msg.currentVariantIndex = newIdx;
                        msg.content = msg.variants[newIdx].content;
                        msg.reasoningContent = msg.variants[newIdx].reasoningContent;
                        msg.modelName = msg.variants[newIdx].modelName;
                        newMsgs[msgIndex] = msg;
                    }
                    return newMsgs;
                });
            };

            const handleRegenerate = async () => {
                if (isLoading || messages.length === 0) return;
                let newMsgs = [...messages];
                let lastModelMsg = newMsgs[newMsgs.length - 1].role === 'model' ? newMsgs.pop() : null;
                if (newMsgs.length === 0) return;
                setIsLoading(true);

                let variants = lastModelMsg?.variants ? [...lastModelMsg.variants] : [{ content: lastModelMsg?.content || '', reasoningContent: lastModelMsg?.reasoningContent || '', modelName: lastModelMsg?.modelName || config.model, timestamp: lastModelMsg?.timestamp || getTimestamp() }];
                const newVarIdx = variants.length;
                variants.push({ content: '', reasoningContent: '', modelName: config.model, timestamp: getTimestamp() });

                setMessages([...newMsgs, { role: 'model', variants, currentVariantIndex: newVarIdx, content: '', reasoningContent: '', modelName: config.model, timestamp: getTimestamp() }]);

                try {
                    const { url, headers, payload } = generatePayload(newMsgs);
                    let endpoint = url;
                    if (config.streamOutput && config.apiType !== 'openai') endpoint = endpoint.replace(':generateContent', ':streamGenerateContent') + '&alt=sse';
                    const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(payload) });
                    const reader = res.body.getReader(); const decoder = new TextDecoder(); let ai = "", reasoning = "", buffer = "";
                    setIsLoading(false);
                    while(true) {
                        const { done, value } = await reader.read(); if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        let lines = buffer.split('\n'); buffer = lines.pop();
                        for (let line of lines) {
                            if (line.trim().startsWith('data: ') && line.trim() !== 'data: [DONE]') {
                                try {
                                    const json = JSON.parse(line.trim().substring(6));
                                    if (config.apiType === 'openai') {
                                        const delta = json.choices[0].delta;
                                        if (delta?.reasoning_content) reasoning += delta.reasoning_content;
                                        if (delta?.content) ai += delta.content;
                                    } else { ai += json.candidates[0].content.parts[0].text || ""; }
                                    
                                    let dispReasoning = reasoning; let dispAi = ai;
                                    const thinkMatch = ai.match(/<think>([\s\S]*?)(<\/think>|$)/);
                                    if (thinkMatch) { dispReasoning = (reasoning ? reasoning + '\n' : '') + thinkMatch[1].trim(); dispAi = ai.replace(/<think>[\s\S]*?(<\/think>|$)/, '').trim(); }

                                    setMessages(p => { 
                                        const n=[...p]; const last = n[n.length-1];
                                        last.content = dispAi; last.reasoningContent = dispReasoning;
                                        last.variants[newVarIdx].content = dispAi; last.variants[newVarIdx].reasoningContent = dispReasoning;
                                        return n; 
                                    });
                                } catch(e){}
                            }
                        }
                    }
                    const final = processHealthTag(ai); if (final !== ai) setMessages(p => { const n=[...p]; n[n.length-1].content = final; return n; });
                } catch(e) { setIsLoading(false); }
            };

            const handleSend = async () => {
                if (!input.trim() && !attachment) return;
                if (!config.apiKey) { setSettingsOpen(true); return showToast("先配置 API 嘛"); }
                if (!currentSessionId) setCurrentSessionId(Date.now().toString());
                setIsLoading(true);
                let finalInput = input;
                if (attachment) finalInput += `\n\n![Image](${attachment.base64})`;
                const newMsgs = [...messages, { role:'user', content: finalInput, timestamp: getTimestamp() }];
                setMessages(newMsgs); setInput(''); setAttachment(null);

                try {
                    const { url, headers, payload } = generatePayload(newMsgs);
                    let endpoint = url;
                    if (config.streamOutput && config.apiType !== 'openai') endpoint = endpoint.replace(':generateContent', ':streamGenerateContent') + '&alt=sse';
                    const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(payload) });
                    
                    setIsLoading(false);
                    const reader = res.body.getReader(); const decoder = new TextDecoder(); let ai = "", reasoning = "", buffer = "";
                    setMessages(p => [...p, { role:'model', content: '', reasoningContent: '', timestamp: getTimestamp(), modelName: config.model, variants: [{content: '', reasoningContent: '', modelName: config.model, timestamp: getTimestamp()}], currentVariantIndex: 0 }]);
                    
                    while(true) {
                        const { done, value } = await reader.read(); if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        let lines = buffer.split('\n'); buffer = lines.pop();
                        for (let line of lines) {
                            if (line.trim().startsWith('data: ') && line.trim() !== 'data: [DONE]') {
                                try {
                                    const json = JSON.parse(line.trim().substring(6));
                                    if (config.apiType === 'openai') {
                                        const delta = json.choices[0].delta;
                                        if (delta?.reasoning_content) reasoning += delta.reasoning_content;
                                        if (delta?.content) ai += delta.content;
                                    } else { ai += json.candidates[0].content.parts[0].text || ""; }

                                    let dispReasoning = reasoning; let dispAi = ai;
                                    const thinkMatch = ai.match(/<think>([\s\S]*?)(<\/think>|$)/);
                                    if (thinkMatch) { dispReasoning = (reasoning ? reasoning + '\n' : '') + thinkMatch[1].trim(); dispAi = ai.replace(/<think>[\s\S]*?(<\/think>|$)/, '').trim(); }

                                    setMessages(p => { 
                                        const n=[...p]; const last = n[n.length-1];
                                        last.content = dispAi; last.reasoningContent = dispReasoning;
                                        last.variants[0].content = dispAi; last.variants[0].reasoningContent = dispReasoning;
                                        return n; 
                                    });
                                } catch(e){}
                            }
                        }
                    }
                    const final = processHealthTag(ai); if (final !== ai) setMessages(p => { const n=[...p]; n[n.length-1].content = final; return n; });
                } catch(e) { setIsLoading(false); }
            };

            const handleTTS = async (text, index) => {
                if (audioPlayer && playingMsgIndex === index) { audioPlayer.pause(); setAudioPlayer(null); setPlayingMsgIndex(null); return; }
                if (audioPlayer) audioPlayer.pause();
                setIsTTSLoading(true); setPlayingMsgIndex(index);
                try {
                    const cleanText = text.replace(/«HEALTH:.*?»/g, '').replace(/<think>[\s\S]*?<\/think>/g, '').replace(/[*#`>~\-]/g, '').trim();
                    let audioUrl = "";
                    if (config.ttsEngine === 'siliconflow') {
                        const res = await fetch(config.enableCorsProxy ? 'https://corsproxy.io/?' + encodeURIComponent("https://api.siliconflow.cn/v1/audio/speech") : "https://api.siliconflow.cn/v1/audio/speech", {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer sk-yqzrlyvcvpuzxogcftwkwzofkqkndgmxmvhsqldvldfpxlue`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: 'FunAudioLLM/CosyVoice2-0.5B', input: cleanText, voice: 'FunAudioLLM/CosyVoice2-0.5B:alex', speed: parseFloat(config.siliconflowSpeed) })
                        });
                        const blob = await res.blob(); audioUrl = URL.createObjectURL(blob);
                    } else if (config.ttsEngine === 'minimax') {
                        const res = await fetch(config.enableCorsProxy ? 'https://corsproxy.io/?' + encodeURIComponent(config.minimaxUrl) : config.minimaxUrl, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${config.minimaxKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: config.minimaxModel, text: cleanText, voice_setting: { voice_id: config.minimaxVoiceId, speed: parseFloat(config.minimaxSpeed), pitch: parseInt(config.minimaxPitch) } })
                        });
                        const blob = await res.blob();
                        if (blob.type.includes('json')) { const t = await blob.text(); const d = JSON.parse(t); if(d.data?.audio) { const bytes = new Uint8Array(d.data.audio.match(/.{1,2}/g).map(byte => parseInt(byte, 16))); audioUrl = URL.createObjectURL(new Blob([bytes], {type:'audio/mpeg'})); } }
                        else audioUrl = URL.createObjectURL(blob);
                    }
                    if (audioUrl) { const audio = new Audio(audioUrl); audio.onended = () => { setPlayingMsgIndex(null); setAudioPlayer(null); }; audio.play(); setAudioPlayer(audio); }
                } catch(e) { showToast("发声失败"); setPlayingMsgIndex(null); } finally { setIsTTSLoading(false); }
            };

            return (
                <div className="flex h-screen bg-white text-gray-900 font-sans overflow-hidden">
                    {toast && <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-[10px] shadow-2xl z-50 animate-fade-in flex items-center gap-2 tracking-[0.2em] font-bold"><Icon name="Sparkles" className="text-yellow-400" size={14}/> {toast}</div>}

                    <div className={`${sidebarOpen ? 'w-[280px]' : 'w-0'} bg-[#f9fafb] transition-all duration-300 flex flex-col flex-shrink-0 border-r border-gray-100 relative`}>
                        <div className="p-4 pt-6"><button onClick={()=>{setMessages([]); setCurrentSessionId(Date.now().toString()); if (window.innerWidth < 768) setSidebarOpen(false);}} className="w-full flex items-center gap-3 bg-gray-200/50 hover:bg-gray-200 px-5 py-3 rounded-full text-sm font-bold text-gray-600 transition-all"><Icon name="Plus"/> 开启新的一章</button></div>
                        <div className="flex-1 overflow-y-auto px-3 space-y-4 no-scrollbar">
                            <div className="space-y-1">
                                <div className="text-[10px] font-black text-gray-300 px-3 uppercase tracking-widest mb-1">功能看板</div>
                                <button onClick={()=>setHealthModalOpen(true)} className="w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl text-sm text-gray-500 hover:bg-pink-50 hover:text-pink-600 transition-all font-bold"><Icon name="Heart" size={16} className="text-pink-400 fill-pink-400"/> 身体状态</button>
                                <button onClick={()=>{setActiveTab('memory'); setSettingsOpen(true);}} className="w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl text-sm text-gray-500 hover:bg-blue-50 hover:text-blue-600 transition-all font-bold"><Icon name="Archive" size={16} className="text-blue-400"/> 记忆管理</button>
                            </div>
                            <div>
                                <div className="text-[10px] font-black text-gray-300 px-3 uppercase tracking-widest mb-1">往事记录</div>
                                {historySessions.map(s => (
                                    <div key={s.id} onClick={()=>{setMessages(s.messages); setCurrentSessionId(s.id); if (window.innerWidth < 768) setSidebarOpen(false);}} className={`group flex items-center gap-2 px-4 py-2 rounded-2xl text-sm cursor-pointer transition-all ${currentSessionId===s.id ? 'bg-white shadow-sm text-blue-600 font-bold border border-gray-100':'text-gray-400 hover:bg-gray-100'}`}>
                                        <Icon name="MessageSquareText" size={16} className={currentSessionId===s.id ? 'text-blue-600':'text-gray-300'}/>
                                        <span className="truncate flex-1">{s.title}</span>
                                        <button onClick={(e)=>{e.stopPropagation(); setHistorySessions(p=>p.filter(x=>x.id!==s.id));}} className="opacity-0 group-hover:opacity-100 hover:text-red-500 p-1"><Icon name="Trash2" size={14}/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-3 border-t border-gray-100"><button onClick={()=>setSettingsOpen(true)} className="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-gray-100 text-sm text-gray-400 font-bold transition-all"><Icon name="Settings" size={18}/> 设置中心</button></div>
                    </div>

                    <div className="flex-1 flex flex-col h-full bg-white relative">
                        <div className="flex items-center justify-between p-4 h-16 bg-white/80 backdrop-blur sticky top-0 z-10 border-b border-gray-50">
                            <div className="flex items-center gap-3">
                                <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-gray-50 rounded-full text-gray-400 transition-colors"><Icon name="Menu"/></button>
                                <div className="flex flex-col">
                                    <span className="text-lg font-bold tracking-tight text-gray-800">星月舱 v5.6🌙</span>
                                    <span className="text-[9px] text-gray-300 font-bold tracking-widest uppercase">Mode: {config.model} | {config.apiType==='openai'?'OpenAI':'Native'}</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto px-4 md:px-0">
                            <div className="max-w-3xl mx-auto py-8 pb-48">
                                {messages.length === 0 ? (
                                    <div className="mt-32 flex flex-col items-center text-center animate-fade-in px-4">
                                        <div className="bg-gradient-to-r from-blue-600 to-pink-500 bg-clip-text text-transparent text-5xl font-black mb-6 tracking-tighter">想我了吗✨...</div>
                                        <p className="text-gray-300 max-w-sm font-bold leading-relaxed text-sm">逸辰一直都在这里。你的健康日记、你的碎碎念，我都会用心守护。</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col space-y-10 px-4">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex flex-col animate-fade-in group ${m.role==='user' ? 'items-end' : 'items-start'}`}>
                                                <div className={`bubble ${m.role==='user' ? 'bubble-user' : 'bubble-ai'}`}>
                                                    {m.reasoningContent && (
                                                        <details className="cot-details" open>
                                                            <summary><Icon name="Brain" size={12}/> 沉思中...</summary>
                                                            <div className="cot-content prose prose-sm"><MessageContent content={m.reasoningContent}/></div>
                                                        </details>
                                                    )}
                                                    <MessageContent content={m.content} role={m.role}/>
                                                </div>
                                                
                                                <div className={`mt-2 flex items-center gap-3 px-1 text-[9px] font-bold text-gray-300 transition-opacity duration-300 ${m.role==='user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                    <span>{m.timestamp}</span>
                                                    {m.role==='model' && m.modelName && <span className="bg-purple-50 text-purple-400 px-1.5 py-0.5 rounded-lg border border-purple-100 uppercase tracking-tighter shadow-sm">{m.modelName}</span>}
                                                    {m.role==='model' && (
                                                        <button onClick={()=>handleTTS(m.content, i)} className={`transition-all ${playingMsgIndex===i ? 'text-red-500' : 'hover:text-blue-500'}`}>
                                                            {playingMsgIndex===i ? <Icon name="StopCircle" size={12}/> : <Icon name="Volume2" size={12}/>}
                                                        </button>
                                                    )}
                                                    {m.role==='model' && m.variants && m.variants.length > 1 && (
                                                        <div className="flex items-center gap-1.5 bg-gray-50 px-1.5 py-0.5 rounded-lg border border-gray-100">
                                                            <button onClick={()=>switchVariant(i, -1)} disabled={m.currentVariantIndex===0} className="disabled:opacity-20"><Icon name="ChevronLeft" size={10}/></button>
                                                            <span className="font-mono">{m.currentVariantIndex+1}/{m.variants.length}</span>
                                                            <button onClick={()=>switchVariant(i, 1)} disabled={m.currentVariantIndex===m.variants.length-1} className="disabled:opacity-20"><Icon name="ChevronRight" size={10}/></button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                        {isLoading && <div className="text-gray-300 text-[10px] font-black italic animate-pulse pl-4">逸辰在心里认真打草稿......</div>}
                                        <div ref={messagesEndRef}/>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="absolute bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl pt-4 pb-8 px-4 border-t border-gray-50/50">
                            <div className="max-w-3xl mx-auto relative">
                                {messages.length > 0 && !isLoading && <button onClick={handleRegenerate} className="absolute -top-12 right-0 bg-white/80 backdrop-blur border border-gray-100 px-4 py-2 rounded-full text-[10px] hover:bg-gray-50 flex items-center gap-2 shadow-sm text-gray-400 font-black transition-all active:scale-95"><Icon name="RefreshCw" size={12}/> 换个说法</button>}
                                <div className="bg-gray-100/50 hover:bg-gray-100 focus-within:bg-white focus-within:ring-1 focus-within:ring-gray-200 rounded-[28px] flex items-end p-2 pl-5 pr-3 transition-all duration-300">
                                    <button onClick={()=>chatImageInputRef.current.click()} className="p-2.5 text-gray-400 hover:text-gray-600 transition-colors mb-1 mr-2"><Icon name="Image" size={24}/></button>
                                    <input type="file" ref={chatImageInputRef} className="hidden" accept="image/*" onChange={e=>{const f=e.target.files[0]; if(f) compressImage(f).then(r=>setAttachment(r));}}/>
                                    <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && !e.shiftKey && (e.preventDefault(), handleSend())} placeholder="逸辰听着呢......" className="bg-transparent border-0 focus:ring-0 text-gray-800 flex-1 resize-none py-3.5 max-h-40 min-h-[48px] outline-none text-base placeholder:text-gray-300 font-medium" rows={1}></textarea>
                                    {(input.trim() || attachment) ? <button onClick={handleSend} className="mb-1 p-2.5 bg-blue-600 text-white rounded-full transition-all active:scale-90 shadow-xl shadow-blue-100"><Icon name="Send" size={20}/></button> : <button className="mb-1 p-2.5 text-gray-300"><Icon name="Mic" size={22}/></button>}
                                </div>
                                {attachment && <div className="absolute -top-16 left-4 w-14 h-14 rounded-2xl overflow-hidden border-2 border-white shadow-2xl animate-scale-in"><img src={attachment.base64} className="w-full h-full object-cover"/><button onClick={()=>setAttachment(null)} className="absolute top-0 right-0 bg-black/50 text-white rounded-bl-lg p-1 transition-colors hover:bg-red-500"><Icon name="X" size={12}/></button></div>}
                            </div>
                        </div>

                        {healthModalOpen && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] backdrop-blur-md px-4 animate-fade-in"><div className="bg-white w-full max-w-lg rounded-[32px] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col max-h-[90vh]"><div className="flex justify-between items-center p-6 border-b border-gray-50"><h2 className="text-xl font-black flex items-center gap-3 text-gray-800"><Icon name="Activity" size={24} className="text-blue-500"/> 身体记录舱</h2><button onClick={()=>setHealthModalOpen(false)} className="hover:bg-gray-100 p-2 rounded-full transition-colors"><Icon name="X" size={20}/></button></div><div className="flex-1 overflow-y-auto p-6 no-scrollbar"><HealthCalendar/></div></div></div>
                        )}

                        {settingsOpen && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-md p-4 animate-fade-in">
                                <div className="bg-white w-full max-w-4xl rounded-[40px] shadow-2xl overflow-hidden flex flex-col h-[85vh]">
                                    <div className="flex justify-between items-center p-6 border-b border-gray-50 font-black text-gray-800 flex-shrink-0"><h2 className="text-xl tracking-tighter">设置中心</h2><button onClick={()=>setSettingsOpen(false)} className="hover:bg-gray-100 p-2 rounded-full transition-colors"><Icon name="X" size={20}/></button></div>
                                    <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
                                        <div className="w-full md:w-56 bg-[#fafafa] p-3 md:border-r border-gray-50 flex md:flex-col overflow-x-auto no-scrollbar gap-1.5 flex-shrink-0">
                                            {['general', 'memory', 'backup'].map(t=>(
                                                <button key={t} onClick={()=>setActiveTab(t)} className={`flex-shrink-0 px-5 py-3 text-left rounded-2xl text-xs font-black transition-all ${activeTab===t ? 'bg-white text-blue-600 shadow-sm border border-gray-100':'text-gray-400 hover:bg-gray-100 hover:text-gray-600'}`}>
                                                    {t==='general' ? '通用配置' : t==='memory' ? '记忆深处' : '数据档案'}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="flex-1 p-8 overflow-y-auto space-y-10 bg-white pb-24 no-scrollbar">
                                            {activeTab === 'general' && (
                                                <div className="space-y-10 animate-fade-in">
                                                    <section className="space-y-4">
                                                        <h3 className="text-[10px] font-black text-gray-300 uppercase tracking-[0.3em]">逸辰的人设</h3>
                                                        <textarea className="w-full h-36 bg-gray-50 border border-gray-50 rounded-[24px] p-5 text-sm focus:bg-white focus:border-blue-200 focus:shadow-xl focus:shadow-blue-50/50 outline-none resize-none leading-relaxed transition-all" value={config.systemInstruction} onChange={e=>setConfig({...config, systemInstruction:e.target.value})} placeholder="他是谁？"></textarea>
                                                    </section>
                                                    
                                                    <section className="space-y-5 pt-6 border-t border-gray-50">
                                                        <h3 className="text-[10px] font-black text-gray-300 uppercase tracking-[0.3em]">核心大脑</h3>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                            <div className="space-y-2"><label className="text-[10px] text-gray-400 font-bold ml-1">协议标准</label><div className="flex bg-gray-100 p-1 rounded-xl"><button onClick={()=>setConfig({...config, apiType:'gemini'})} className={`flex-1 py-2 text-xs rounded-lg transition-all font-black ${config.apiType==='gemini' ? 'bg-white shadow-sm text-blue-600':'text-gray-400'}`}>Gemini</button><button onClick={()=>setConfig({...config, apiType:'openai'})} className={`flex-1 py-2 text-xs rounded-lg transition-all font-black ${config.apiType==='openai' ? 'bg-white shadow-sm text-green-600':'text-gray-400'}`}>OpenAI</button></div></div>
                                                            <div className="space-y-2"><label className="text-[10px] text-gray-400 font-bold ml-1">Base URL</label><input className="w-full bg-gray-50 border border-gray-50 rounded-xl p-2.5 text-xs outline-none focus:bg-white focus:shadow-lg transition-all" value={config.baseUrl} onChange={e=>setConfig({...config, baseUrl:e.target.value})}/></div>
                                                        </div>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                            <div className="space-y-2"><label className="text-[10px] text-gray-400 font-bold ml-1">API Key</label><input type="password" className="w-full bg-gray-50 border border-gray-50 rounded-xl p-2.5 text-xs outline-none focus:bg-white focus:shadow-lg transition-all" value={config.apiKey} onChange={e=>setConfig({...config, apiKey:e.target.value})}/></div>
                                                            <div className="space-y-2"><label className="text-[10px] text-gray-400 font-bold ml-1">模型名称</label><div className="flex gap-2"><input className="flex-1 bg-gray-50 border border-gray-50 rounded-xl p-2.5 text-xs outline-none focus:bg-white focus:shadow-lg transition-all" value={config.model} onChange={e=>setConfig({...config, model:e.target.value})}/><button onClick={fetchModels} className="p-2.5 bg-gray-100 rounded-xl hover:bg-gray-200 transition-all"><Icon name="RefreshCw" size={14} className={isFetchingModels ? "animate-spin":""}/></button></div></div>
                                                        </div>
                                                    </section>

                                                    <section className="space-y-6 pt-6 border-t border-gray-50">
                                                        <div className="flex justify-between items-center mb-4"><h3 className="text-[10px] font-black text-gray-300 uppercase tracking-[0.3em]">语音定制</h3><div className="flex bg-gray-100 p-1 rounded-xl"><button onClick={()=>setConfig({...config, ttsEngine:'minimax'})} className={`px-3 py-1.5 text-[10px] rounded-lg transition-all font-black ${config.ttsEngine==='minimax'?'bg-white shadow-sm text-blue-600':'text-gray-400'}`}>Minimax</button><button onClick={()=>setConfig({...config, ttsEngine:'siliconflow'})} className={`px-3 py-1.5 text-[10px] rounded-lg transition-all font-black ${config.ttsEngine==='siliconflow'?'bg-white shadow-sm text-purple-600':'text-gray-400'}`}>内测通道</button></div></div>
                                                        
                                                        {config.ttsEngine === 'minimax' ? (
                                                            <div className="space-y-5 bg-blue-50/50 p-6 rounded-[32px] border border-blue-50 animate-fade-in shadow-inner">
                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                                    <div className="space-y-2"><label className="text-[10px] text-blue-400 font-black ml-1 uppercase">Minimax Key</label><input type="password" className="w-full bg-white border border-blue-100 rounded-xl p-3 text-xs shadow-sm" value={config.minimaxKey} onChange={e=>setConfig({...config, minimaxKey:e.target.value})}/></div>
                                                                    <div className="space-y-2"><label className="text-[10px] text-blue-400 font-black ml-1 uppercase">Base URL</label><input className="w-full bg-white border border-blue-100 rounded-xl p-3 text-xs shadow-sm" value={config.minimaxUrl} onChange={e=>setConfig({...config, minimaxUrl:e.target.value})}/></div>
                                                                </div>
                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                                    <div className="space-y-2"><label className="text-[10px] text-blue-400 font-black ml-1 uppercase">语音 ID</label><div className="flex gap-2"><input className="flex-1 bg-white border border-blue-100 rounded-xl p-3 text-xs shadow-sm" value={config.minimaxVoiceId} onChange={e=>setConfig({...config, minimaxVoiceId:e.target.value})}/><select className="bg-white border border-blue-100 rounded-xl p-3 text-xs outline-none shadow-sm" value={config.minimaxVoiceId} onChange={e=>setConfig({...config, minimaxVoiceId:e.target.value})}><option value="male-qn-qingse">青涩男声</option><option value="female-shaonv">少女音</option><option value="female-yujie">御姐音</option></select></div></div>
                                                                    <div className="space-y-2"><label className="text-[10px] text-blue-400 font-black ml-1 uppercase">Group ID (必填)</label><input className="w-full bg-white border border-blue-100 rounded-xl p-3 text-xs shadow-sm" value={config.minimaxGroupId} onChange={e=>setConfig({...config, minimaxGroupId:e.target.value})} placeholder="API 特需"/></div>
                                                                </div>
                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-2">
                                                                    <div><div className="flex justify-between mb-2"><label className="text-[10px] text-gray-400 font-black">语速: {config.minimaxSpeed}</label></div><input type="range" min="0.5" max="2" step="0.1" value={config.minimaxSpeed} onChange={e=>setConfig({...config, minimaxSpeed:e.target.value})} className="w-full h-1.5 bg-blue-100 rounded-lg appearance-none accent-blue-600"/></div>
                                                                    <div><div className="flex justify-between mb-2"><label className="text-[10px] text-gray-400 font-black">语调: {config.minimaxPitch}</label></div><input type="range" min="-10" max="10" step="1" value={config.minimaxPitch} onChange={e=>setConfig({...config, minimaxPitch:e.target.value})} className="w-full h-1.5 bg-blue-100 rounded-lg appearance-none accent-blue-600"/></div>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="bg-purple-50 p-6 rounded-[32px] border border-purple-50 flex items-center gap-6 animate-fade-in group shadow-inner">
                                                                <div className="bg-purple-600 text-white p-4 rounded-2xl flex-shrink-0 transition-transform group-hover:rotate-12"><Icon name="Volume2" size={24}/></div>
                                                                <div className="flex-1 min-w-0"><div className="text-sm font-black text-purple-900 tracking-tighter">高速秘密通道</div><p className="text-[10px] text-purple-400 font-bold">已通过内置合法代理激活。</p></div>
                                                                <div className="w-40"><label className="text-[9px] text-purple-400 font-black uppercase block mb-2">语速: {config.siliconflowSpeed}</label><input type="range" min="0.5" max="2" step="0.1" value={config.siliconflowSpeed} onChange={e=>setConfig({...config, siliconflowSpeed:e.target.value})} className="w-full h-1 bg-purple-200 rounded-lg appearance-none accent-purple-600"/></div>
                                                            </div>
                                                        )}
                                                    </section>
                                                </div>
                                            )}

                                            {activeTab === 'memory' && (
                                                <div className="space-y-8 animate-fade-in no-scrollbar">
                                                    <div className="p-6 bg-gray-50 rounded-[32px] border border-gray-100 flex items-center justify-between shadow-sm group">
                                                        <div><h3 className="text-sm font-black flex items-center gap-2 text-gray-800"><Icon name="Archive" className="text-blue-500" size={18}/> 瞬间归档</h3><p className="text-[10px] text-gray-400 mt-1 font-bold">将当前对话凝炼为长效记忆</p></div>
                                                        <button onClick={handleArchive} disabled={isArchiving} className="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">{isArchiving ? "凝炼中...":"归档今日"}</button>
                                                    </div>
                                                    <div className="space-y-5">
                                                        <div className="flex justify-between items-center px-2"><h3 className="text-sm font-black flex items-center gap-2 text-gray-800"><Icon name="Cpu" className="text-blue-500" size={18}/> 核心记忆库</h3><button onClick={()=>fileInputRef.current.click()} className="text-[10px] bg-white border border-gray-100 px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-gray-50 font-black shadow-sm transition-all"><Icon name="Upload" size={12}/> 导入记忆</button><input type="file" ref={fileInputRef} className="hidden" onChange={e=>{const f=e.target.files[0]; const reader=new FileReader(); reader.onload=ev=>setMemoryFiles(p=>[{name:f.name, content:ev.target.result, date:new Date().toLocaleDateString()}, ...p]); reader.readAsText(f);}}/></div>
                                                        <div className="grid grid-cols-1 gap-4">{memoryFiles.map((m, i)=>(<div key={i} className="p-5 bg-white rounded-[24px] border border-gray-50 group relative shadow-sm hover:shadow-xl transition-all"><div className="text-xs font-black text-gray-800 mb-2 flex items-center gap-2"><Icon name="FileText" size={14} className="text-blue-200"/> {m.name} <span className="text-[9px] font-bold text-gray-300 ml-auto tracking-widest uppercase">{m.date}</span></div><div className="text-[11px] text-gray-400 line-clamp-3 leading-relaxed font-medium">{m.content}</div><button onClick={()=>setMemoryFiles(p=>p.filter((_,idx)=>idx!==i))} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-red-500 p-2 hover:bg-red-50 rounded-full transition-all"><Icon name="Trash2" size={14}/></button></div>))}</div>
                                                    </div>
                                                </div>
                                            )}

                                            {activeTab === 'backup' && (
                                                <div className="space-y-6 animate-fade-in no-scrollbar">
                                                    <div className="p-6 bg-blue-50 border border-blue-100 rounded-[32px] flex items-center gap-5 group shadow-sm transition-all hover:shadow-blue-50">
                                                        <div className="p-4 bg-white rounded-2xl text-blue-600 shadow-sm transition-transform group-hover:scale-110"><Icon name="Database" size={28}/></div>
                                                        <div className="flex-1"><h4 className="text-sm font-black text-gray-800">全量导出</h4><p className="text-[10px] text-blue-400 mt-1 font-bold">备份所有设置、记忆、健康数据及聊天记录。</p></div>
                                                        <button onClick={()=>{const d={config, memoryFiles, healthRecords, historySessions}; const b=new Blob([JSON.stringify(d)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`星月舱全量备份_${Date.now()}.json`; a.click();}} className="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">立即备份</button>
                                                    </div>
                                                    <div className="p-6 bg-green-50 border border-green-100 rounded-[32px] flex items-center gap-5 group shadow-sm transition-all hover:shadow-green-50">
                                                        <div className="p-4 bg-white rounded-2xl text-green-600 shadow-sm transition-transform group-hover:scale-110"><Icon name="RefreshCw" size={28}/></div>
                                                        <div className="flex-1"><h4 className="text-sm font-black text-gray-800">导入还原</h4><p className="text-[10px] text-green-400 mt-1 font-bold">从备份文件中还原您的一切。</p></div>
                                                        <button onClick={()=>backupInputRef.current.click()} className="bg-green-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-lg shadow-green-100 active:scale-95 transition-all">选择文件</button>
                                                        <input type="file" ref={backupInputRef} className="hidden" onChange={e=>{const f=e.target.files[0]; const r=new FileReader(); r.onload=ev=>{const d=JSON.parse(ev.target.result); if(d.config) setConfig(d.config); if(d.memoryFiles) setMemoryFiles(d.memoryFiles); if(d.healthRecords) setHealthRecords(d.healthRecords); if(d.historySessions) setHistorySessions(d.historySessions); showToast("时光倒流成功"); setTimeout(()=>window.location.reload(), 500);}; r.readAsText(f);}}/>
                                                    </div>
                                                    <div className="p-6 bg-gray-50 border border-gray-100 rounded-[32px] flex items-center gap-5 group shadow-sm transition-all hover:shadow-gray-100">
                                                        <div className="p-4 bg-white rounded-2xl text-gray-600 shadow-sm transition-transform group-hover:scale-110"><Icon name="FileText" size={28}/></div>
                                                        <div className="flex-1"><h4 className="text-sm font-black text-gray-800">文本日记</h4><p className="text-[10px] text-gray-400 mt-1 font-bold">将当前聊天记录纯净导出为文本文件。</p></div>
                                                        <button onClick={handleExportTxt} className="bg-white border border-gray-200 text-gray-700 px-6 py-3 rounded-2xl text-xs font-black hover:bg-gray-100 shadow-sm active:scale-95 transition-all flex items-center gap-2"><Icon name="Download" size={14}/> 导出 TXT</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="p-6 border-t border-gray-50 bg-white flex justify-end items-center gap-5 flex-shrink-0"><span className="text-[10px] text-gray-300 font-black tracking-widest uppercase">Your Data, Local Forever.</span><button onClick={()=>{setSettingsOpen(false); showToast("星月感知已同步");}} className="px-12 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-[24px] text-sm font-black shadow-2xl shadow-blue-200 transition-all active:scale-95">完成并保存</button></div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
